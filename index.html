/* ============================================================
   18. RGPD — détection des inactifs 3 ans+
   ============================================================ */
function openRgpdModal() {
  const limit = 1095;
  const stale = S.contacts.filter(c => {
    const acts = actsOfContact(c.id);
    const lastTs = acts.length ? acts[0].at : c.createdAt;
    const hasOpen = dealsOfContact(c.id).some(d => d.status === 'open');
    return !hasOpen && daysSince(lastTs) > limit;
  });
  openModal(`
    <div class="modal-head"><h2>Contacts inactifs depuis 3 ans+</h2></div>
    <div class="modal-body">
      ${stale.length ? `
        <p style="margin:0;font-size:13px" class="muted">${stale.length} contact(s) sans aucune interaction depuis plus de 3 ans et sans affaire en cours.
        La CNIL recommande leur suppression ou anonymisation.</p>
        <div style="max-height:260px;overflow-y:auto;border:1px solid var(--hairline);border-radius:10px">
          ${stale.map(c => `
            <label style="display:flex;gap:10px;align-items:center;padding:8px 12px;border-bottom:1px solid var(--hairline);cursor:pointer">
              <input type="checkbox" data-rgpd="${c.id}" checked style="accent-color:var(--ink)">
              <span style="flex:1">${esc(c.name)}${c.company ? ' · ' + esc(c.company) : ''}</span>
              <span class="muted mono" style="font-size:10.5px">${relPast(actsOfContact(c.id)[0] ? actsOfContact(c.id)[0].at : c.createdAt)}</span>
            </label>`).join('')}
        </div>` : `<p style="margin:0">Aucun contact inactif depuis plus de 3 ans. Votre base est propre.</p>`}
    </div>
    <div class="modal-foot">
      <button class="btn" data-close>Fermer</button>
      ${stale.length ? '<button class="btn btn-danger" id="rgpdPurge">Supprimer la sélection</button>' : ''}
    </div>`);
  const purge = $('#rgpdPurge');
  if (purge) purge.onclick = () => {
    const ids = $$('[data-rgpd]:checked').map(x => x.dataset.rgpd);
    const snapshot = JSON.stringify({ contacts: S.contacts, deals: S.deals, activities: S.activities });
    ids.forEach(removeContactCascade);
    closeModal(); commit();
    toast(ids.length + ' contact(s) purgé(s) — RGPD', () => {
      const snap = JSON.parse(snapshot);
      S.contacts = snap.contacts; S.deals = snap.deals; S.activities = snap.activities;
      commit();
    });
  };
}

/* ============================================================
   19. SAUVEGARDE JSON / EXPORTS CSV / ICS
   ============================================================ */
function exportBackup() {
  S.meta.lastBackupAt = new Date().toISOString();
  persist();
  download('cadence-sauvegarde-' + today() + '.json', JSON.stringify(S, null, 1), 'application/json');
  render();
  toast('Sauvegarde exportée — gardez-la en lieu sûr');
}
function importBackup() {
  const input = document.createElement('input');
  input.type = 'file'; input.accept = '.json,application/json';
  input.onchange = () => {
    const f = input.files[0];
    if (!f) return;
    f.text().then(txt => {
      try {
        const raw = JSON.parse(txt);
        validateState(raw);
        const incoming = migrate(raw);
        openModal(`
          <div class="modal-head"><h2>Restaurer cette sauvegarde ?</h2></div>
          <div class="modal-body"><p style="margin:0">${incoming.contacts.length} contacts · ${incoming.deals.length} affaires · ${incoming.activities.length} activités.
          <br>Les données actuelles (${S.contacts.length} contacts, ${S.deals.length} affaires) seront remplacées.</p></div>
          <div class="modal-foot"><button class="btn" data-close>Annuler</button><button class="btn btn-primary" id="restOk">Restaurer</button></div>`);
        $('#restOk').onclick = () => { S = incoming; closeModal(); commit(); toast('Sauvegarde restaurée'); };
      } catch (e) { toast('Fichier invalide : ' + e.message, null, 6000); }
    });
  };
  input.click();
}

/* CSV : point-virgule + BOM = ouverture directe dans Excel FR sans rien casser */
function csvCell(v) {
  let s = String(v ?? '');
  if (/^[=+\-@\t]/.test(s) && !/^-?\d+([.,]\d+)?( \u20ac)?$/.test(s)) s = "'" + s; // anti-injection de formules
  return /[";\n\r]/.test(s) ? '"' + s.replace(/"/g, '""') + '"' : s;
}
function csvOf(rows) { return '﻿' + rows.map(r => r.map(csvCell).join(';')).join('\r\n'); }

function exportContactsCSV(onlyIds) {
  const list = onlyIds ? S.contacts.filter(c => onlyIds.includes(c.id)) : S.contacts;
  const rows = [['Nom', 'Société', 'Email', 'Téléphone', 'Tags', 'SIRET', 'TVA', 'Notes', 'Fiche créée']];
  list.forEach(c => rows.push([c.name, c.company || '', c.email || '', fmtPhone(c.phone), (c.tags || []).join(', '), c.siret || '', c.tva || '', c.note || '', String(c.createdAt).slice(0, 10)]));
  download('cadence-contacts-' + today() + '.csv', csvOf(rows), 'text/csv;charset=utf-8');
  toast(list.length + ' contact(s) exporté(s) — réversibilité totale');
}
function exportDealsCSV() {
  const rows = [['Intitulé', 'Contact', 'Société', 'Montant HT', 'Étape', 'Statut', 'Probabilité %', 'Pondéré', 'Créée le', 'Close le', 'Raison de perte', 'Prochaine action', 'Date action']];
  S.deals.forEach(d => {
    const c = contactById(d.contactId) || {};
    const st = stageById(d.stageId) || {};
    rows.push([d.title, c.name || '', c.company || '', Number(d.value) || 0,
      st.name || '', d.status === 'open' ? 'En cours' : d.status === 'won' ? 'Gagnée' : 'Perdue',
      dealProb(d), Math.round(dealWeighted(d)),
      String(d.createdAt).slice(0, 10), d.closedAt ? String(d.closedAt).slice(0, 10) : '',
      d.lostReason || '', d.next ? (ACTION_KINDS[d.next.kind] || '') : '', d.next ? d.next.date : '']);
  });
  download('cadence-affaires-' + today() + '.csv', csvOf(rows), 'text/csv;charset=utf-8');
  toast(S.deals.length + ' affaire(s) exportée(s)');
}

/* .ics : les relances dans votre vrai agenda — le rappel que le fichier fermé ne peut pas donner */
function exportICS() {
  const deals = openDeals().filter(d => d.next && d.next.date);
  if (!deals.length) { toast('Aucune relance planifiée à exporter'); return; }
  const stamp = new Date().toISOString().replace(/[-:.]/g, '').slice(0, 15) + 'Z';
  const lines = ['BEGIN:VCALENDAR', 'VERSION:2.0', 'PRODID:-//Cadence CRM//FR', 'CALSCALE:GREGORIAN'];
  deals.forEach(d => {
    const c = contactById(d.contactId) || {};
    const dt = d.next.date.replace(/-/g, '');
    const title = (ACTION_KINDS[d.next.kind] || 'Relance') + ' : ' + (c.name || '') + (c.company ? ' (' + c.company + ')' : '') + ' — ' + d.title;
    lines.push('BEGIN:VEVENT',
      'UID:' + d.id + '@cadence-crm',
      'DTSTAMP:' + stamp,
      'DTSTART;VALUE=DATE:' + dt,
      'SUMMARY:' + title.replace(/[\n,;]/g, ' '),
      d.value ? 'DESCRIPTION:Montant estimé ' + Math.round(d.value) + ' EUR HT' : 'DESCRIPTION:Cadence CRM',
      'END:VEVENT');
  });
  lines.push('END:VCALENDAR');
  download('cadence-relances-' + today() + '.ics', lines.join('\r\n'), 'text/calendar');
  toast(deals.length + ' relance(s) exportée(s) vers votre agenda');
}
</script>

<script>
'use strict';

/* ============================================================
   20. IMPORT CSV / EXCEL — le moment critique de la migration
   Encodage détecté, colonnes devinées, prévisualisation obligatoire.
   ============================================================ */
const CSV_FIELDS = { '': 'Ignorer', name: 'Nom', company: 'Société', email: 'Email', phone: 'Téléphone', tags: 'Tags', note: 'Notes', siret: 'SIRET', tva: 'TVA' };

function sniffDelimiter(text) {
  const line = text.split(/\r?\n/).find(l => l.trim()) || '';
  const counts = { '\t': (line.match(/\t/g) || []).length, ';': (line.match(/;/g) || []).length, ',': (line.match(/,/g) || []).length };
  return Object.entries(counts).sort((a, b) => b[1] - a[1])[0][1] > 0 ? Object.entries(counts).sort((a, b) => b[1] - a[1])[0][0] : ';';
}
function parseCSV(text, delim) {
  const rows = [];
  let row = [], cell = '', inQ = false;
  for (let i = 0; i < text.length; i++) {
    const ch = text[i];
    if (inQ) {
      if (ch === '"') { if (text[i + 1] === '"') { cell += '"'; i++; } else inQ = false; }
      else cell += ch;
    } else if (ch === '"') inQ = true;
    else if (ch === delim) { row.push(cell); cell = ''; }
    else if (ch === '\n' || ch === '\r') {
      if (ch === '\r' && text[i + 1] === '\n') i++;
      row.push(cell); cell = '';
      if (row.some(c => c.trim() !== '')) rows.push(row);
      row = [];
    } else cell += ch;
  }
  row.push(cell);
  if (row.some(c => c.trim() !== '')) rows.push(row);
  return rows;
}
function guessField(header) {
  const h = norm(header);
  if (/^(nom|name|contact|prenom nom|full ?name)/.test(h)) return 'name';
  if (/(societe|company|entreprise|organisation|structure|raison sociale)/.test(h)) return 'company';
  if (/(mail|courriel)/.test(h)) return 'email';
  if (/(tel|phone|portable|mobile|fixe)/.test(h)) return 'phone';
  if (/(tag|groupe|categorie|type|segment|statut)/.test(h)) return 'tags';
  if (/siret|siren/.test(h)) return 'siret';
  if (/tva|vat/.test(h)) return 'tva';
  if (/(note|comment|remarque|observation)/.test(h)) return 'note';
  return '';
}
function cleanPhone(v) {
  let s = String(v || '').trim().replace(/^="?|"$/g, '');
  const digits = s.replace(/[^\d+]/g, '');
  if (/^[36-7]\d{8}$/.test(digits) && digits.length === 9) s = '0' + digits; // zéro initial mangé par Excel
  else if (/^\d{9}$/.test(digits) && !digits.startsWith('0')) s = '0' + digits;
  return fmtPhone(s) || s;
}

function openCsvImport() {
  openModal(`
    <div class="modal-head"><h2>Importer des contacts</h2></div>
    <div class="modal-body">
      <p class="desc" style="margin:0;font-size:12.5px;color:var(--ink-2)">Depuis Excel ou Google Sheets : sélectionnez vos colonnes (avec la ligne d’en-têtes), copiez, collez ci-dessous.
      Ou chargez un fichier .csv. Rien n’est importé sans votre validation.</p>
      <textarea class="textarea mono" id="csvPaste" rows="6" placeholder="Collez ici depuis Excel / Sheets…&#10;Nom	Société	Email	Téléphone&#10;Marie Lefort	Atelier Lefort	marie@atelier.fr	06 12 34 56 78" style="font-size:11.5px"></textarea>
      <div class="btn-row"><label class="btn btn-sm" style="cursor:pointer">Choisir un fichier .csv<input type="file" id="csvFile" accept=".csv,.txt,text/csv" hidden></label></div>
      <div id="csvZone"></div>
    </div>
    <div class="modal-foot">
      <button class="btn" data-close>Annuler</button>
      <button class="btn btn-primary" id="csvGo" disabled>Importer</button>
    </div>`);
  $('#modalRoot').classList.add('lg');

  let parsed = null, mapping = [];

  const analyze = text => {
    if (!text || !text.trim()) return;
    const delim = sniffDelimiter(text);
    const rows = parseCSV(text, delim);
    if (!rows.length) return;
    const headers = rows[0];
    // Ligne d'en-têtes ? Si la 1re ligne contient un email, c'est déjà des données.
    const headerish = !headers.some(h => /\S+@\S+\.\S+/.test(h));
    parsed = { headers: headerish ? headers : headers.map((_, i) => 'Colonne ' + (i + 1)), rows: headerish ? rows.slice(1) : rows };
    mapping = parsed.headers.map(guessField);
    if (!mapping.includes('name')) { const i = mapping.findIndex(m => !m); if (i >= 0) mapping[i] = 'name'; }
    renderPreview();
  };

  const renderPreview = () => {
    if (!parsed) return;
    const dupes = countDupes();
    $('#csvZone').innerHTML = `
      <div class="csv-stats">
        <span><b>${parsed.rows.length}</b> ligne(s) détectée(s)</span>
        <span>${dupes} doublon(s) probable(s) — ignoré(s) à l’import</span>
      </div>
      <div class="csv-preview">
        <table>
          <thead><tr>${parsed.headers.map((h, i) => `
            <th>${esc(h)}<select data-map="${i}">${Object.entries(CSV_FIELDS).map(([k, v]) => `<option value="${k}" ${mapping[i] === k ? 'selected' : ''}>${v}</option>`).join('')}</select></th>`).join('')}
          </tr></thead>
          <tbody>${parsed.rows.slice(0, 8).map(r => `<tr>${parsed.headers.map((_, i) => `<td>${esc(r[i] || '')}</td>`).join('')}</tr>`).join('')}</tbody>
        </table>
      </div>
      ${parsed.rows.length > 8 ? `<span class="muted" style="font-size:11px">Aperçu des 8 premières lignes sur ${parsed.rows.length}.</span>` : ''}`;
    $$('#csvZone [data-map]').forEach(sel => sel.onchange = () => { mapping[Number(sel.dataset.map)] = sel.value; renderPreview(); });
    $('#csvGo').disabled = !mapping.includes('name');
  };

  const rowToContact = r => {
    const c = { id: uid(), name: '', company: '', email: '', phone: '', tags: [], note: '', siret: '', tva: '', createdAt: new Date().toISOString() };
    mapping.forEach((f, i) => {
      if (!f) return;
      const v = String(r[i] || '').trim();
      if (!v) return;
      if (f === 'tags') c.tags = v.split(/[,;|]/).map(x => x.trim()).filter(Boolean);
      else if (f === 'phone') c.phone = cleanPhone(v);
      else if (f === 'note') c.note = c.note ? c.note + '\n' + v : v;
      else c[f] = v;
    });
    return c;
  };
  const countDupes = () => parsed.rows.reduce((n, r) => { const c = rowToContact(r); return n + (c.name && findDuplicate(c, null) ? 1 : 0); }, 0);

  $('#csvPaste').addEventListener('input', debounce(e => analyze(e.target.value), 250));
  $('#csvFile').addEventListener('change', () => {
    const f = $('#csvFile').files[0];
    if (!f) return;
    f.arrayBuffer().then(buf => {
      let text;
      try { text = new TextDecoder('utf-8', { fatal: true }).decode(buf); }
      catch (_) { text = new TextDecoder('windows-1252').decode(buf); } // vieux exports Excel FR
      if (text.charCodeAt(0) === 0xFEFF) text = text.slice(1);
      analyze(text);
    });
  });

  $('#csvGo').onclick = () => {
    if (!parsed || !mapping.includes('name')) return;
    let added = 0, skippedDup = 0, skippedEmpty = 0;
    parsed.rows.forEach(r => {
      const c = rowToContact(r);
      if (!c.name) { skippedEmpty++; return; }
      if (findDuplicate(c, null)) { skippedDup++; return; }
      S.contacts.push(c);
      added++;
    });
    S.meta.onboarded = true;
    $('#modalRoot').classList.remove('lg');
    closeModal(); commit();
    toast(added + ' contact(s) importé(s)' + (skippedDup ? ' · ' + skippedDup + ' doublon(s) ignoré(s)' : '') + (skippedEmpty ? ' · ' + skippedEmpty + ' sans nom' : ''));
    go('contacts');
  };
}

/* ============================================================
   21. PALETTE Ctrl+K — recherche & commandes, 100 % clavier
   ============================================================ */
let palOpen = false;
function openPalette() {
  if (palOpen) return;
  palOpen = true;
  const root = $('#overlayRoot');
  root.insertAdjacentHTML('beforeend', `
    <div class="palette-veil" id="palVeil"></div>
    <div class="palette" id="palEl" role="dialog" aria-label="Recherche et commandes">
      <input id="palInput" role="combobox" aria-expanded="true" aria-controls="palList" aria-autocomplete="list" aria-label="Rechercher un contact, une affaire, une note ou une commande" placeholder="Contact, affaire, note, commande…" autocomplete="off" spellcheck="false">
      <div class="palette-list" id="palList" role="listbox"></div>
      <div class="pal-foot"><span>↑↓ naviguer</span><span>Entrée ouvrir</span><span>Échap fermer</span></div>
    </div>`);
  const input = $('#palInput'), list = $('#palList');
  let items = [], sel = 0;

  const actions = [
    { label: 'Nouvelle affaire', hint: 'N', run: () => openQuickAdd() },
    { label: 'Nouveau contact', hint: 'C', run: () => openContactModal() },
    { label: "Aller à : Aujourd'hui", hint: 'G A', run: () => go('aujourdhui') },
    { label: 'Aller à : Pipeline', hint: 'G P', run: () => go('pipeline') },
    { label: 'Aller à : Contacts', hint: 'G C', run: () => go('contacts') },
    { label: 'Aller à : Statistiques', hint: 'G S', run: () => go('stats') },
    { label: 'Aller à : Réglages', hint: 'G R', run: () => go('reglages') },
    { label: 'Exporter la sauvegarde (.json)', hint: '', run: exportBackup },
    { label: 'Exporter les relances (.ics)', hint: '', run: exportICS },
    { label: 'Basculer clair / sombre', hint: '', run: toggleTheme },
  ];

  const buildResults = q => {
    const nq = norm(q.trim());
    const out = [];
    const push = (group, item) => out.push(Object.assign({ group }, item));
    if (nq) {
      const score = s => norm(s).startsWith(nq) ? 0 : 1;
      S.contacts
        .filter(c => norm(c.name + ' ' + (c.company || '') + ' ' + (c.email || '') + ' ' + (c.phone || '')).includes(nq))
        .sort((a, b) => score(a.name) - score(b.name)).slice(0, 6)
        .forEach(c => push('Contacts', { label: c.name + (c.company ? ' · ' + c.company : ''), run: () => openContactDrawer(c.id) }));
      S.deals
        .filter(d => { const c = contactById(d.contactId); return norm(d.title + ' ' + (c ? c.name + ' ' + (c.company || '') : '')).includes(nq); })
        .sort((a, b) => (a.status === 'open' ? 0 : 1) - (b.status === 'open' ? 0 : 1)).slice(0, 6)
        .forEach(d => { const c = contactById(d.contactId); push('Affaires', { label: d.title + (c ? ' — ' + c.name : ''), money: d.value ? fmtEUR(d.value) : '', dim: d.status !== 'open', run: () => openDealDrawer(d.id) }); });
      S.activities
        .filter(a => a.type !== 'systeme' && a.type !== 'etape' && norm(a.text).includes(nq)).slice(0, 4)
        .forEach(a => push('Notes', {
          label: a.text.length > 70 ? a.text.slice(0, 70) + '…' : a.text,
          run: () => a.dealId ? openDealDrawer(a.dealId) : openContactDrawer(a.contactId),
        }));
      actions.filter(a => norm(a.label).includes(nq)).forEach(a => push('Commandes', a));
    } else {
      lateDeals().slice(0, 4).forEach(d => { const c = contactById(d.contactId); push('En retard', { label: (c ? c.name + ' — ' : '') + d.title, money: 'J+' + (-daysFromToday(d.next.date)), run: () => openDealDrawer(d.id) }); });
      actions.forEach(a => push('Commandes', a));
    }
    return out;
  };

  const renderList = () => {
    if (!items.length) { list.innerHTML = '<div class="pal-empty">Aucun résultat. Essayez un nom, une société, un mot d’une note.</div>'; return; }
    let html = '', lastGroup = null;
    items.forEach((it, i) => {
      if (it.group !== lastGroup) { html += `<div class="pal-group" role="presentation">${esc(it.group)}</div>`; lastGroup = it.group; }
      html += `<div class="pal-item ${i === sel ? 'sel' : ''}" id="pal-opt-${i}" role="option" aria-selected="${i === sel}" data-i="${i}">
        <span class="t" ${it.dim ? 'style="opacity:.55"' : ''}>${esc(it.label)}</span>
        ${it.money ? `<span class="money muted">${esc(it.money)}</span>` : ''}
        ${it.hint ? `<kbd>${esc(it.hint)}</kbd>` : ''}
      </div>`;
    });
    list.innerHTML = html;
    $$('.pal-item', list).forEach(el => {
      el.onclick = () => pick(Number(el.dataset.i));
      el.onmousemove = () => { sel = Number(el.dataset.i); $$('.pal-item', list).forEach(x => x.classList.toggle('sel', x === el)); };
    });
    const selEl = $('.pal-item.sel', list);
    if (selEl) selEl.scrollIntoView({ block: 'nearest' });
    input.setAttribute('aria-activedescendant', items.length ? 'pal-opt-' + sel : '');
  };
  const refresh = () => { items = buildResults(input.value); sel = 0; renderList(); };
  const pick = i => { const it = items[i]; if (!it) return; closePalette(); it.run(); };

  input.addEventListener('input', refresh);
  input.addEventListener('keydown', e => {
    if (e.key === 'ArrowDown') { e.preventDefault(); sel = Math.min(items.length - 1, sel + 1); renderList(); }
    else if (e.key === 'ArrowUp') { e.preventDefault(); sel = Math.max(0, sel - 1); renderList(); }
    else if (e.key === 'Enter') { e.preventDefault(); pick(sel); }
    else if (e.key === 'Escape') { e.preventDefault(); closePalette(); }
  });
  $('#palVeil').onclick = closePalette;
  refresh();
  input.focus();
}
function closePalette() {
  palOpen = false;
  const v = $('#palVeil'), p = $('#palEl');
  v && v.remove(); p && p.remove();
}

/* ============================================================
   22. TOASTS (avec annulation)
   ============================================================ */
function toast(msg, undo, ms = 4200) {
  const box = $('#toasts');
  const el = document.createElement('div');
  el.className = 'toast';
  el.innerHTML = `<span>${esc(msg)}</span>${undo ? '<button>Annuler</button>' : ''}`;
  box.appendChild(el);
  if (undo) $('button', el).onclick = () => { undo(); el.remove(); };
  setTimeout(() => { el.style.opacity = '0'; el.style.transition = 'opacity .25s'; setTimeout(() => el.remove(), 260); }, ms);
}

/* ============================================================
   23. THÈME & RACCOURCIS CLAVIER
   ============================================================ */
function applyTheme() {
  const pref = S.settings.theme || 'auto';
  const dark = pref === 'dark' || (pref === 'auto' && window.matchMedia('(prefers-color-scheme: dark)').matches);
  document.documentElement.dataset.theme = dark ? 'dark' : 'light';
}
function toggleTheme() {
  const cur = document.documentElement.dataset.theme === 'dark';
  S.settings.theme = cur ? 'light' : 'dark';
  persist();
  applyTheme();
}
window.matchMedia('(prefers-color-scheme: dark)').addEventListener('change', applyTheme);

let gPending = false, gTimer = null;
document.addEventListener('keydown', e => {
  if ($('#modalRoot').open) return; // le dialog natif gère Échap ; aucun raccourci sous une modale
  const inField = /^(INPUT|TEXTAREA|SELECT)$/.test(e.target.tagName) || e.target.isContentEditable;
  if ((e.ctrlKey || e.metaKey) && e.key.toLowerCase() === 'k') { e.preventDefault(); palOpen ? closePalette() : openPalette(); return; }
  if (inField) return;
  if (e.key === 'Escape') {
    if (palOpen) { closePalette(); return; }
    if (drawerOpen) { closeDrawer(); return; }
    return;
  }
  if (e.ctrlKey || e.metaKey || e.altKey) return;
  const k = e.key.toLowerCase();
  if (gPending) {
    gPending = false; clearTimeout(gTimer);
    const map = { a: 'aujourdhui', p: 'pipeline', c: 'contacts', s: 'stats', r: 'reglages' };
    if (map[k]) { e.preventDefault(); go(map[k]); }
    return;
  }
  if (k === 'g') { gPending = true; gTimer = setTimeout(() => gPending = false, 900); return; }
  if (k === '/') { e.preventDefault(); openPalette(); return; }
  if (k === 'n') { e.preventDefault(); openQuickAdd(); return; }
  if (k === 'c') { e.preventDefault(); openContactModal(); return; }
});
</script>
