};

function currentRoute() {
  const h = location.hash.replace(/^#\/?/, '');
  return ROUTES[h] ? h : 'aujourdhui';
}
function go(route) { location.hash = '#/' + route; }
window.addEventListener('hashchange', render);

function renderNav() {
  const r = currentRoute();
  const urgent = lateDeals().length + dueToday().length;
  $('#nav').innerHTML = Object.entries(ROUTES).map(([key, v]) => `
    <button class="nav-item ${key === r ? 'active' : ''}" data-go="${key}">
      ${ICONS[v.icon]}<span>${v.title}</span>
      ${key === 'aujourdhui' && urgent ? `<span class="nav-count">${urgent}</span>` : ''}
    </button>`).join('');
  $$('#nav [data-go]').forEach(b => b.onclick = () => go(b.dataset.go));
}

function renderBackupChip() {
  const chip = $('#backupChip'), txt = $('#backupTxt');
  const last = S.meta.lastBackupAt;
  const n = S.contacts.length + S.deals.length;
  txt.textContent = 'Sauvegarde : ' + relPast(last);
  chip.classList.toggle('warn', n > 5 && (!last || daysSince(last) > 7));
}

function render() {
  const route = currentRoute();
  renderNav();
  renderBackupChip();
  const meta = ROUTES[route];
  const counts = {
    aujourdhui: '', pipeline: openDeals().length + ' affaires en cours',
    contacts: S.contacts.length + ' fiches', stats: '', reglages: '',
  };
  $('#viewTitle').innerHTML = esc(meta.title) + (counts[route] ? ` <span class="sub">${esc(counts[route])}</span>` : '');
  const view = $('#view');
  view.className = 'view' + (route === 'pipeline' ? ' wide' : '');
  renderBulkbar();
  if (!S.meta.onboarded && !S.contacts.length && !S.deals.length && route === 'aujourdhui') { renderWelcome(view); return; }
  ({ aujourdhui: renderToday, pipeline: renderPipeline, contacts: renderContacts, stats: renderStats, reglages: renderSettings })[route](view);
}

/* ============================================================
   5. ACCUEIL PREMIER LANCEMENT
   ============================================================ */
function renderWelcome(view) {
  view.innerHTML = `
    <div class="welcome">
      <svg width="52" height="52" viewBox="0 0 32 32" aria-hidden="true"><rect width="32" height="32" rx="8" fill="var(--accent)"/><path d="M9 22V14M15 22V10M21 22V17" stroke="var(--accent-ink)" stroke-width="3" stroke-linecap="round"/><circle cx="25.5" cy="9.5" r="2.5" fill="var(--red)"/></svg>
      <h1>Qui devez-vous relancer&nbsp;?</h1>
      <p>Cadence est un CRM construit autour d&rsquo;une seule discipline&nbsp;: la relance.
      80&nbsp;% des ventes se signent entre la 5<sup>e</sup> et la 12<sup>e</sup> relance —
      cet outil vous dit chaque matin qui relancer, et garde la mémoire de chaque échange.</p>
      <div class="row">
        <button class="btn btn-primary" id="wDemo">Découvrir avec des données d&rsquo;exemple</button>
        <button class="btn" id="wEmpty">Commencer vide</button>
        <button class="btn" id="wImport">Importer mon fichier Excel&nbsp;/&nbsp;CSV</button>
      </div>
      <p class="fine">Un seul fichier. Zéro serveur, zéro compte, zéro cookie.<br>
      Vos données restent dans ce navigateur — conformité RGPD par conception.</p>
    </div>`;
  $('#wDemo').onclick = () => { seedDemo(); S.meta.onboarded = true; commit(); toast('Données d’exemple chargées — remplacez-les quand vous voulez (Réglages)'); };
  $('#wEmpty').onclick = () => { S.meta.onboarded = true; commit(); openQuickAdd(); };
  $('#wImport').onclick = () => { S.meta.onboarded = true; persist(); openCsvImport(); };
}

/* ============================================================
   6. VUE AUJOURD'HUI — la liste du matin
   ============================================================ */
function renderToday(view) {
  const late = lateDeals().sort((a, b) => a.next.date.localeCompare(b.next.date));
  const todayList = dueToday();
  const tomorrow = dueTomorrow();
  const sleeping = sleepDeals();
  const noAction = noActionDeals();
  const n = late.length + todayList.length;
  const needBackup = (S.contacts.length + S.deals.length) > 5 && (!S.meta.lastBackupAt || daysSince(S.meta.lastBackupAt) > 7);

  view.innerHTML = `
    <div class="today-hero">
      <div>
        <h1>${n === 0 ? 'Rien d’urgent. Belle journée.' : n + ' relance' + (n > 1 ? 's' : '') + ' à traiter'}</h1>
        <div class="date">${dfLong.format(new Date())}</div>
      </div>
      <div class="today-actions">
        <button class="btn" id="icsBtn" title="Exporter les relances vers votre agenda">Agenda .ics</button>
        <button class="btn btn-primary" id="todayAdd">+ Affaire</button>
      </div>
    </div>
    ${needBackup ? `<div class="banner">Aucune sauvegarde depuis ${S.meta.lastBackupAt ? daysSince(S.meta.lastBackupAt) + ' jours' : 'le début'}. Vos données ne vivent que dans ce navigateur.
      <button class="btn btn-sm" id="bannerBackup">Exporter maintenant</button></div>` : ''}
    ${sectionTasks('En retard', late, 'late')}
    ${sectionTasks("Aujourd'hui", todayList, 'today')}
    ${sectionTasks('Demain', tomorrow, 'tomorrow')}
    ${noAction.length ? `
      <div class="section-head"><h2>Sans prochaine action</h2><span class="count">${noAction.length}</span>
      <span class="spacer"></span><span class="muted" style="font-size:11.5px">une affaire sans action datée finit oubliée</span></div>
      <div class="card task-list">${noAction.map(d => taskRow(d, 'noaction')).join('')}</div>` : ''}
    ${sleeping.length ? `
      <div class="section-head"><h2>À réveiller</h2><span class="count">${sleeping.length}</span>
      <span class="spacer"></span><span class="muted" style="font-size:11.5px">sans activité depuis trop longtemps</span></div>
      <div class="card task-list">${sleeping.map(d => taskRow(d, 'sleep')).join('')}</div>` : ''}
    ${!openDeals().length ? `<div class="card empty">
        <div class="big">Aucune affaire en cours</div>
        <div>Créez votre première affaire — un nom suffit pour commencer.</div>
        <button class="btn btn-primary" id="emptyAdd">+ Nouvelle affaire</button>
      </div>` : ''}
  `;
  const bb = $('#bannerBackup'); if (bb) bb.onclick = exportBackup;
  $('#icsBtn').onclick = exportICS;
  $('#todayAdd').onclick = () => openQuickAdd();
  const ea = $('#emptyAdd'); if (ea) ea.onclick = () => openQuickAdd();
  bindTaskRows(view);
}

function sectionTasks(title, list, mode) {
  if (!list.length && mode !== 'late') return '';
  if (!list.length) return '';
  return `
    <div class="section-head"><h2>${esc(title)}</h2><span class="count">${list.length}</span></div>
    <div class="card task-list">${list.map(d => taskRow(d, mode)).join('')}</div>`;
}

function taskRow(d, mode) {
  const c = contactById(d.contactId);
  const late = mode === 'late';
  const kindLabel = d.next ? (ACTION_KINDS[d.next.kind] || 'Relance') : '';
  const tc = touchCount(d);
  return `
    <div class="task-row" data-deal="${d.id}" tabindex="0">
      <span class="dot ${late ? 'red' : mode === 'sleep' || mode === 'noaction' ? 'amber' : 'green'}"></span>
      <div class="task-main">
        <div class="task-title"><span class="who">${esc(c ? c.name : '?')}${c && c.company ? ' · ' + esc(c.company) : ''}</span></div>
        <div class="task-sub">
          <span class="action-label">${d.next ? esc(kindLabel + (d.next.label ? ' — ' + d.next.label : '')) : mode === 'sleep' ? 'dernier échange ' + relPast(d.lastActivityAt || d.createdAt) : 'aucune action planifiée'}</span>
          <span class="muted">·</span><span>${esc(d.title)}</span>
        </div>
      </div>
      <div class="task-side">
        ${late ? `<span class="overdue-days">J+${-daysFromToday(d.next.date)}</span>` : ''}
        ${tc ? `<span class="chip" title="${tc} contact(s) pris sur cette affaire">n°${tc + 1}</span>` : ''}
        <span class="money muted">${d.value ? fmtEUR(d.value) : ''}</span>
        <span class="task-quick">
          ${(mode === 'late' || mode === 'today' || mode === 'tomorrow') ? `
            <button class="btn btn-xs btn-primary" data-done="${d.id}">Fait</button>
            <button class="btn btn-xs" data-defer="${d.id}">Reporter</button>` : `
            <button class="btn btn-xs btn-primary" data-plan="${d.id}">Planifier</button>`}
        </span>
      </div>
    </div>`;
}

function bindTaskRows(root) {
  $$('.task-row', root).forEach(row => {
    row.addEventListener('click', e => {
      if (e.target.closest('button')) return;
      openDealDrawer(row.dataset.deal);
    });
    row.addEventListener('keydown', e => {
      if (e.key === 'Enter' && !e.target.closest('button')) openDealDrawer(row.dataset.deal);
    });
  });
  $$('[data-done]', root).forEach(b => b.onclick = () => markDone(b.dataset.done, b.closest('.task-row')));
  $$('[data-defer]', root).forEach(b => b.onclick = () => inlineSchedule(b.dataset.defer, b.closest('.task-row'), { defer: true }));
  $$('[data-plan]', root).forEach(b => b.onclick = () => inlineSchedule(b.dataset.plan, b.closest('.task-row'), {}));
}

/* « Fait » : consigne l'action dans le fil, puis planifie la suivante en une frappe. */
function markDone(dealId, rowEl) {
  const d = dealById(dealId);
  if (!d) return;
  const kind = d.next && d.next.kind ? d.next.kind : 'relance';
  const type = kind === 'relance' ? 'appel' : (kind in ACT_TYPES ? kind : 'appel');
  addActivity({ dealId: d.id, contactId: d.contactId, type: ['appel','email','rdv'].includes(type) ? type : 'appel',
    text: (ACTION_KINDS[kind] || 'Relance') + (d.next && d.next.label ? ' — ' + d.next.label : '') + ' ✓' });
  d.next = null;
  persist();
  inlineSchedule(dealId, rowEl, { afterDone: true });
}

/* Planificateur inline : Entrée = accepter la suggestion. Jamais de modale. */
function inlineSchedule(dealId, rowEl, opts = {}) {
  const d = dealById(dealId);
  if (!d || !rowEl) { render(); return; }
  const delay = suggestedDelay(d);
  const kinds = Object.entries(ACTION_KINDS);
  const holder = document.createElement('div');
  holder.className = 'task-row';
  holder.innerHTML = `
    <div class="drop-prompt" style="flex:1">
      <span>${opts.afterDone ? 'Fait ✓ — prochaine action :' : 'Prochaine action :'}</span>
      <select class="k" style="background:transparent;border:none;color:inherit;font-family:var(--mono);font-size:12px">
        ${kinds.map(([k, v]) => `<option value="${k}" ${k === 'relance' ? 'selected' : ''}>${v}</option>`).join('')}
      </select>
      <input class="dt" type="date" value="${addDays(today(), delay)}">
      <span style="opacity:.75">dans ${delay} j</span>
      <kbd>Entrée</kbd>
      <span style="flex:1"></span>
      ${opts.afterDone ? `<button class="btn btn-xs" data-close-deal style="border-color:color-mix(in srgb,var(--accent-ink) 35%,transparent);background:none;color:inherit">Clore l’affaire…</button>` : ''}
      <button class="btn btn-xs" data-cancel style="border-color:color-mix(in srgb,var(--accent-ink) 35%,transparent);background:none;color:inherit">Échap</button>
    </div>`;
  rowEl.replaceWith(holder);
  const dt = $('.dt', holder), k = $('.k', holder);
  dt.focus();
  const validate = () => {
    d.next = { kind: k.value, label: '', date: dt.value || addDays(today(), delay) };
    commit();
    toast('Prochaine action : ' + (ACTION_KINDS[k.value] || '') + ' ' + relDay(d.next.date));
  };
  holder.addEventListener('keydown', e => {
    if (e.key === 'Enter') { e.preventDefault(); validate(); }
    if (e.key === 'Escape') { e.preventDefault(); render(); }
  });
  const cc = $('[data-close-deal]', holder);
  if (cc) cc.onclick = () => openCloseDeal(d.id);
  $('[data-cancel]', holder).onclick = () => render();
}
</script>

<script>
'use strict';

/* ============================================================
   7. VUE PIPELINE — kanban
   ============================================================ */
const CLOSED_WINDOW_DAYS = 30;

function renderPipeline(view) {
  const t = pipelineTotals();
  const stages = S.settings.stages;
  const recentWon = S.deals.filter(d => d.status === 'won' && d.closedAt && daysSince(d.closedAt) <= CLOSED_WINDOW_DAYS);
  const recentLost = S.deals.filter(d => d.status === 'lost' && d.closedAt && daysSince(d.closedAt) <= CLOSED_WINDOW_DAYS);
  const archWon = S.deals.filter(d => d.status === 'won').length - recentWon.length;
  const archLost = S.deals.filter(d => d.status === 'lost').length - recentLost.length;

  view.innerHTML = `
    <div style="padding: 0 26px;">
      <div class="card pipe-band">
        <div class="pipe-stat"><span class="v money">${fmtEUR(t.pond)}</span><span class="l">pipeline pondéré</span></div>
        <div class="sep"></div>
        <div class="pipe-stat"><span class="v money" style="font-weight:600;color:var(--ink-2)">${fmtEUR(t.brut)}</span><span class="l">valeur brute</span></div>
        <div class="sep"></div>
        <div class="pipe-stat"><span class="v money" style="color:var(--green)">${fmtEUR(t.wonMonth)}</span><span class="l">gagné ce mois</span></div>
        <div class="sep"></div>
        <div class="pipe-stat"><span class="v ${t.late ? 'red' : ''}">${t.late}</span><span class="l">relance${t.late > 1 ? 's' : ''} en retard</span></div>
      </div>
    </div>
    <div class="board" id="board">
      ${stages.map(st => stageColumn(st)).join('')}
      ${closedColumn('won', 'Gagné', recentWon, archWon)}
      ${closedColumn('lost', 'Perdu', recentLost, archLost)}
    </div>`;
  bindBoard(view);
}

function stageColumn(st) {
  const deals = openDeals().filter(d => d.stageId === st.id)
    .sort((a, b) => (a.next && a.next.date ? a.next.date : '9999').localeCompare(b.next && b.next.date ? b.next.date : '9999'));
  const brut = deals.reduce((s, d) => s + (Number(d.value) || 0), 0);
  const pond = deals.reduce((s, d) => s + dealWeighted(d), 0);
  return `
    <div class="col" data-stage="${st.id}">
      <div class="col-head"><span class="name">${esc(st.name)}</span><span class="n">${deals.length}</span><span class="prob">${st.prob}&nbsp;%</span></div>
      <div class="col-totals"><span>${fmtEUR(brut)}</span><span>· pondéré ${fmtEUR(pond)}</span></div>
      <div class="col-body" data-drop="${st.id}">
        ${deals.map(d => dealCard(d)).join('')}
        <button class="btn btn-ghost btn-sm" data-add-stage="${st.id}" style="justify-content:flex-start">+ Ajouter</button>
      </div>
    </div>`;
}

function closedColumn(status, label, deals, archived) {
  const total = deals.reduce((s, d) => s + (Number(d.value) || 0), 0);
  return `
    <div class="col closed" data-status="${status}">
      <div class="col-head"><span class="name" style="color:${status === 'won' ? 'var(--green)' : 'var(--ink-3)'}">${label}</span><span class="n">${deals.length}</span><span class="prob">30 j</span></div>
      <div class="col-totals"><span>${fmtEUR(total)}</span></div>
      <div class="col-body" data-drop-status="${status}">
        ${deals.sort((a, b) => b.closedAt.localeCompare(a.closedAt)).map(d => dealCard(d, true)).join('')}
        ${archived > 0 ? `<div class="muted" style="font-family:var(--mono);font-size:10px;padding:4px 6px">+ ${archived} archivée${archived > 1 ? 's' : ''} — tout reste dans les statistiques et la recherche</div>` : ''}
      </div>
    </div>`;
}

function dealCard(d, closed = false) {
  const c = contactById(d.contactId);
  const alert = dealAlert(d);
  const tc = touchCount(d);
  const stateClass = alert === 'late' ? 'state-late' : alert === 'sleep' ? 'state-sleep' : '';
  let foot = '';
  if (closed) {
    foot = `<span class="next-chip">${d.status === 'won' ? 'gagnée' : 'perdue'} ${relPast(d.closedAt)}</span>
            ${d.status === 'lost' && d.lostReason ? `<span class="spacer"></span><span class="sleep-tag" style="color:var(--ink-3)">${esc(d.lostReason)}</span>` : ''}`;
  } else if (alert === 'late') {
    foot = `<span class="next-chip late">⚑ relance J+${-daysFromToday(d.next.date)}</span>`;
  } else if (d.next && d.next.date) {
    foot = `<span class="next-chip">→ ${esc(ACTION_KINDS[d.next.kind] || 'Relance')} ${relDay(d.next.date)}</span>`;
  } else {
    foot = `<span class="next-chip none">sans action</span>`;
  }
  const sleep = alert === 'sleep' ? `<span class="spacer"></span><span class="sleep-tag">dort depuis ${daysSince(d.lastActivityAt || d.createdAt)} j</span>` : '';
  return `
    <div class="deal-card ${stateClass}" draggable="${!closed}" data-deal="${d.id}" tabindex="0" role="button" aria-label="${esc(d.title)}">
      <div class="deal-top">
        <span class="deal-title">${esc(d.title)}</span>
        <span class="deal-amount">${d.value ? fmtEUR(d.value) : '—'}</span>
      </div>
      <div class="deal-who">${esc(c ? c.name : '?')}${c && c.company ? ' · ' + esc(c.company) : ''}</div>
      <div class="deal-foot">${foot}${sleep}${!closed && tc ? `<span class="spacer"></span><span class="chip" title="${tc} contact(s) déjà pris">n°${tc + 1}</span>` : ''}</div>
    </div>`;
}

let dragDealId = null;

function bindBoard(view) {
  $$('.deal-card', view).forEach(card => {
    card.addEventListener('click', () => openDealDrawer(card.dataset.deal));
    card.addEventListener('keydown', e => { if (e.key === 'Enter') openDealDrawer(card.dataset.deal); });
    if (card.draggable) {
      card.addEventListener('dragstart', e => {
        dragDealId = card.dataset.deal;
        card.classList.add('dragging');
        e.dataTransfer.effectAllowed = 'move';
        try { e.dataTransfer.setData('text/plain', dragDealId); } catch (_) {}
      });
      card.addEventListener('dragend', () => { card.classList.remove('dragging'); dragDealId = null; });
    }
  });
  $$('.col-body', view).forEach(body => {
    body.addEventListener('dragover', e => { e.preventDefault(); body.classList.add('dragover'); });
    body.addEventListener('dragleave', () => body.classList.remove('dragover'));
    body.addEventListener('drop', e => {
      e.preventDefault();
      body.classList.remove('dragover');
      const id = dragDealId || e.dataTransfer.getData('text/plain');
      if (!id) return;
      if (body.dataset.drop) moveDealToStage(id, body.dataset.drop);
      else if (body.dataset.dropStatus) openCloseDeal(id, body.dataset.dropStatus);
    });
  });
  $$('[data-add-stage]', view).forEach(b => b.onclick = e => { e.stopPropagation(); openQuickAdd({ stageId: b.dataset.addStage }); });
}

/* Changement d'étape : consigné dans l'historique, puis micro-prompt de relance sur la carte. */
function moveDealToStage(dealId, stageId) {
  const d = dealById(dealId);
  if (!d || d.stageId === stageId && d.status === 'open') { render(); return; }
  const from = stageById(d.stageId), to = stageById(stageId);
  const reopened = d.status !== 'open';
  d.status = 'open'; d.closedAt = null; d.lostReason = null;
  d.stageId = stageId;
  d.stageHistory.push({ stageId, at: new Date().toISOString() });
  addActivity({ dealId: d.id, contactId: d.contactId, type: 'etape', text: reopened ? 'Affaire réouverte → ' + (to ? to.name : stageId) : (from ? from.name : '?') + ' → ' + (to ? to.name : stageId) });
  d.lastActivityAt = new Date().toISOString();
  persist(); render();
  // micro-prompt sur la carte fraîchement déplacée (pas depuis le tiroir)
  if (!drawerOpen) {
    const card = $(`.deal-card[data-deal="${d.id}"]`);
    if (card) dropPrompt(d, card);
  }
}

/* Une frappe : Entrée planifie la relance suggérée. Échap laisse tel quel. */
function dropPrompt(d, card) {
  const delay = suggestedDelay(d);
  const prompt = document.createElement('div');
  prompt.className = 'drop-prompt';
  prompt.innerHTML = `
    <span>Relance</span>
    <input class="dt" type="date" value="${addDays(today(), delay)}" aria-label="Date de relance">
    <span style="opacity:.7">J+${delay}</span>
    <span style="flex:1"></span>
    <kbd>Entrée</kbd>`;
  card.after(prompt);
  const dt = $('.dt', prompt);
  dt.focus();
  let doneFlag = false;
  const accept = () => {
    if (doneFlag) return; doneFlag = true;
    d.next = { kind: 'relance', label: '', date: dt.value || addDays(today(), delay) };
    commit();
  };
  const cancel = () => { if (doneFlag) return; doneFlag = true; prompt.remove(); };
  prompt.addEventListener('keydown', e => {
    if (e.key === 'Enter') { e.preventDefault(); accept(); }
    if (e.key === 'Escape') { e.preventDefault(); cancel(); }
  });
  dt.addEventListener('blur', () => setTimeout(cancel, 120));
}

/* ============================================================
   8. CLÔTURE — Gagné / Perdu
   ============================================================ */
function openCloseDeal(dealId, presetStatus) {
  const d = dealById(dealId);
  if (!d) return;
  const c = contactById(d.contactId);
  const reasons = S.settings.lossReasons;
  openModal(`
    <div class="modal-head"><h2>Clore « ${esc(d.title)} »</h2></div>
    <div class="modal-body">
      <div class="choice-chips" id="statusChips">
        <button data-st="won" class="${presetStatus === 'won' ? 'on' : ''}">✓ Gagnée</button>
        <button data-st="lost" class="${presetStatus === 'lost' ? 'on' : ''}">Perdue</button>
      </div>
      <div class="form-row">
        <div class="field"><label>Montant final (€ HT)</label><input class="input" id="clVal" type="number" min="0" step="50" value="${Number(d.value) || 0}"></div>
        <div class="field"><label>Date</label><input class="input" id="clDate" type="date" value="${today()}"></div>
      </div>
      <div class="field" id="lossWrap" style="display:${presetStatus === 'lost' ? 'flex' : 'none'}">
        <label>Raison de la perte <span class="opt">— 40 à 60 % des affaires se perdent sans décision : sachez-le</span></label>
        <div class="choice-chips" id="lossChips">
          ${reasons.map(r => `<button data-r="${esc(r)}">${esc(r)}</button>`).join('')}
        </div>
      </div>
      <div class="muted" style="font-size:12px">${esc(c ? c.name : '')}${c && c.company ? ' · ' + esc(c.company) : ''}</div>
    </div>
    <div class="modal-foot">
      <button class="btn" data-close>Annuler</button>
      <button class="btn btn-primary" id="clOk" ${presetStatus ? '' : 'disabled'}>Confirmer</button>
    </div>`);
  let status = presetStatus || null;
  let lossReason = null;
  const okBtn = $('#clOk');
  $$('#statusChips button').forEach(b => b.onclick = () => {
    status = b.dataset.st;
    $$('#statusChips button').forEach(x => x.classList.toggle('on', x === b));
    $('#lossWrap').style.display = status === 'lost' ? 'flex' : 'none';
    okBtn.disabled = false;
  });
  $$('#lossChips button').forEach(b => b.onclick = () => {
    lossReason = b.dataset.r;
    $$('#lossChips button').forEach(x => x.classList.toggle('on', x === b));
  });
  okBtn.onclick = () => {
    if (!status) return;
    d.status = status;
    d.value = Number($('#clVal').value) || 0;
    const dateStr = $('#clDate').value || today();
    d.closedAt = new Date(parseISO(dateStr).setHours(12)).toISOString();
    d.lostReason = status === 'lost' ? (lossReason || 'Non précisé') : null;
    d.next = null;
    addActivity({ dealId: d.id, contactId: d.contactId, type: 'etape', text: status === 'won' ? 'Affaire gagnée — ' + fmtEUR(d.value) : 'Affaire perdue — ' + (d.lostReason || '') });
    closeModal(); closeDrawer(); commit();
    toast(status === 'won' ? 'Affaire gagnée — ' + fmtEUR(d.value) : 'Affaire classée perdue');
  };
}
</script>

<script>
'use strict';

/* ============================================================
   9. VUE CONTACTS — table, édition inline, actions groupées
   ============================================================ */
let contactsQuery = '';
let contactsTagFilter = null;
let contactsLimit = 200;
const selectedContacts = new Set();

function allTags() {
  const t = new Set();
  S.contacts.forEach(c => (c.tags || []).forEach(x => t.add(x)));
  return [...t].sort((a, b) => a.localeCompare(b, 'fr'));
}

function renderContacts(view) {
  const q = norm(contactsQuery);
  let list = S.contacts.slice().sort((a, b) => a.name.localeCompare(b.name, 'fr'));
  if (q) list = list.filter(c => norm(c.name + ' ' + (c.company || '') + ' ' + (c.email || '') + ' ' + (c.phone || '')).includes(q));
  if (contactsTagFilter) list = list.filter(c => (c.tags || []).includes(contactsTagFilter));
  const shown = list.slice(0, contactsLimit);
  const tags = allTags();

  view.innerHTML = `
    <div class="toolbar">
      <input class="input" id="cSearch" type="search" placeholder="Filtrer les contacts…" value="${esc(contactsQuery)}">
      ${tags.length ? `<div class="tag-filter">${tags.map(t => `<button class="chip tag ${contactsTagFilter === t ? 'on' : ''}" data-tag="${esc(t)}">${esc(t)}</button>`).join('')}</div>` : ''}
      <span class="spacer"></span>
      <button class="btn" id="csvImportBtn">Importer CSV</button>
      <button class="btn" id="csvExportBtn">Exporter CSV</button>
      <button class="btn btn-primary" id="newContactBtn">+ Contact</button>
    </div>
    ${!S.contacts.length ? `<div class="card empty">
        <div class="big">Aucun contact</div>
        <div>Importez votre fichier Excel/CSV existant, ou créez une fiche — un nom suffit.</div>
        <div style="display:flex;gap:8px"><button class="btn" id="emptyImport">Importer CSV</button>
        <button class="btn btn-primary" id="emptyNew">+ Contact</button></div>
      </div>` : `
    <div class="table-wrap">
      <table class="data">
        <thead><tr>
          <th class="rowcheck"><input type="checkbox" id="checkAll" aria-label="Tout sélectionner"></th>
          <th>Nom</th><th>Société</th><th>Email</th><th>Téléphone</th><th>Tags</th>
          <th style="text-align:right">Affaires</th><th>Dernier échange</th>
        </tr></thead>
        <tbody>
          ${shown.map(contactRow).join('')}
        </tbody>
      </table>
    </div>
    ${list.length > contactsLimit ? `<div style="text-align:center;margin-top:12px"><button class="btn" id="moreBtn">Afficher plus (${list.length - contactsLimit} restants)</button></div>` : ''}
    `}
  `;
  const cs = $('#cSearch');
  cs.oninput = debounce(() => { contactsQuery = cs.value; contactsLimit = 200; renderContacts(view); $('#cSearch').focus(); const v = $('#cSearch'); v.setSelectionRange(v.value.length, v.value.length); }, 60);
  $$('.tag-filter .chip', view).forEach(b => b.onclick = () => { contactsTagFilter = contactsTagFilter === b.dataset.tag ? null : b.dataset.tag; renderContacts(view); });
  $('#csvImportBtn') && ($('#csvImportBtn').onclick = openCsvImport);
  $('#csvExportBtn') && ($('#csvExportBtn').onclick = exportContactsCSV);
  $('#newContactBtn') && ($('#newContactBtn').onclick = () => openContactModal());
  $('#emptyImport') && ($('#emptyImport').onclick = openCsvImport);
  $('#emptyNew') && ($('#emptyNew').onclick = () => openContactModal());
  $('#moreBtn') && ($('#moreBtn').onclick = () => { contactsLimit += 300; renderContacts(view); });

  const checkAll = $('#checkAll');
  if (checkAll) checkAll.checked = shown.length > 0 && shown.every(c => selectedContacts.has(c.id));
  if (checkAll) checkAll.onchange = () => {
    shown.forEach(c => checkAll.checked ? selectedContacts.add(c.id) : selectedContacts.delete(c.id));
    renderContacts(view); renderBulkbar();
  };
  bindContactRows(view);
  renderBulkbar();
}

function contactRow(c) {
  const deals = dealsOfContact(c.id);
  const open = deals.filter(d => d.status === 'open');
  const openVal = open.reduce((s, d) => s + (Number(d.value) || 0), 0);
  const lastAct = actsOfContact(c.id)[0];
  return `
    <tr data-contact="${c.id}" tabindex="0">
      <td class="rowcheck"><input type="checkbox" data-check="${c.id}" ${selectedContacts.has(c.id) ? 'checked' : ''} aria-label="Sélectionner ${esc(c.name)}"></td>
      <td><span class="cell-edit" tabindex="0" role="button" data-edit="name" data-id="${c.id}">${esc(c.name)}</span></td>
      <td><span class="cell-edit" tabindex="0" role="button" data-edit="company" data-id="${c.id}">${esc(c.company || '')}</span></td>
      <td><span class="cell-edit" tabindex="0" role="button" data-edit="email" data-id="${c.id}">${esc(c.email || '')}</span></td>
      <td><span class="cell-edit mono" tabindex="0" role="button" style="font-size:12px" data-edit="phone" data-id="${c.id}">${esc(fmtPhone(c.phone) || '')}</span></td>
      <td>${(c.tags || []).map(t => `<span class="chip">${esc(t)}</span>`).join(' ')}</td>
      <td class="num">${open.length ? open.length + ' · ' + fmtEUR(openVal) : (deals.length ? '<span class="muted">' + deals.length + ' close(s)</span>' : '<span class="muted">—</span>')}</td>
      <td class="muted" style="font-size:12px">${lastAct ? relPast(lastAct.at) : 'jamais'}</td>
    </tr>`;
}

function bindContactRows(view) {
  $$('tbody tr', view).forEach(tr => {
    tr.addEventListener('click', e => {
      if (e.target.closest('input, .cell-edit')) return;
      openContactDrawer(tr.dataset.contact);
    });
    tr.addEventListener('keydown', e => {
      if (e.key === 'Enter' && !e.target.closest('input, .cell-edit')) openContactDrawer(tr.dataset.contact);
    });
  });
  $$('[data-check]', view).forEach(ch => ch.onchange = e => {
    e.stopPropagation();
    ch.checked ? selectedContacts.add(ch.dataset.check) : selectedContacts.delete(ch.dataset.check);
    renderBulkbar();
  });
  /* édition inline : clic = éditer, Entrée = valider, Échap = annuler, Tab = champ suivant */
  $$('.cell-edit', view).forEach(cell => {
    cell.addEventListener('click', e => {
      e.stopPropagation();
      if (cell.querySelector('input')) return;
      startCellEdit(cell);
    });
    cell.addEventListener('keydown', e => {
      if ((e.key === 'Enter' || e.key === ' ') && !cell.querySelector('input')) {
        e.preventDefault(); e.stopPropagation(); startCellEdit(cell);
      }
    });
  });
}

function startCellEdit(cell) {
  const id = cell.dataset.id, field = cell.dataset.edit;
  const c = contactById(id);
  if (!c) return;
  const old = c[field] || '';
  cell.innerHTML = `<input type="text" value="${esc(old)}">`;
  const input = $('input', cell);
  input.focus(); input.select();
  let closed = false;
  const finish = (save, goNext) => {
    if (closed) return; closed = true;
    if (save) {
      const v = input.value.trim();
      if (v !== old) {
        c[field] = v;
        persist();
        if (field === 'email' || field === 'phone') warnDuplicate(c);
      }
    }
    const tr = cell.closest('tr');
    cell.innerHTML = esc(field === 'phone' ? fmtPhone(c[field]) : (c[field] || ''));
    if (goNext && tr) {
      const cells = $$('.cell-edit', tr);
      const i = cells.indexOf(cell);
      const next = cells[i + 1];
      if (next) startCellEdit(next);
    }
    renderNav();
  };
  input.addEventListener('keydown', e => {
    if (e.key === 'Enter') { e.preventDefault(); finish(true, false); }
    else if (e.key === 'Escape') { e.preventDefault(); finish(false, false); }
    else if (e.key === 'Tab') { e.preventDefault(); finish(true, true); }
  });
  input.addEventListener('blur', () => finish(true, false));
}

function warnDuplicate(c) {
  const dup = findDuplicate(c, c.id);
  if (dup) toast('Attention : doublon possible avec « ' + dup.name + ' »');
}
function findDuplicate({ email, phone }, excludeId) {
  const e = norm(email || '').trim();
  const p = String(phone || '').replace(/\D/g, '');
  return S.contacts.find(c => c.id !== excludeId && (
    (e && norm(c.email || '') === e) || (p && p.length >= 9 && String(c.phone || '').replace(/\D/g, '').slice(-9) === p.slice(-9))
  ));
}

/* ---------- barre d'actions groupées ---------- */
function renderBulkbar() {
  let bar = $('#bulkbar');
  if (!selectedContacts.size || currentRoute() !== 'contacts') { if (bar) bar.remove(); return; }
  if (!bar) {
    bar = document.createElement('div');
    bar.id = 'bulkbar';
    bar.className = 'bulkbar';
    document.body.appendChild(bar);
  }
  bar.innerHTML = `
    <span class="n">${selectedContacts.size} sélectionné${selectedContacts.size > 1 ? 's' : ''}</span>
    <button class="btn btn-sm" id="bulkTag">Taguer</button>
    <button class="btn btn-sm" id="bulkExport">Exporter</button>
    <button class="btn btn-sm" id="bulkDelete">Supprimer</button>
    <button class="btn btn-sm" id="bulkClear" style="border:none;text-decoration:underline">Annuler</button>`;
  $('#bulkClear').onclick = () => { selectedContacts.clear(); render(); renderBulkbar(); };
  $('#bulkExport').onclick = () => exportContactsCSV([...selectedContacts]);
  $('#bulkDelete').onclick = () => bulkDeleteContacts();
  $('#bulkTag').onclick = () => {
    openModal(`
      <div class="modal-head"><h2>Taguer ${selectedContacts.size} contact(s)</h2></div>
      <div class="modal-body">
        <div class="field"><label>Tag</label><input class="input" id="bulkTagName" list="tagList" placeholder="client, prospect, partenaire…">
        <datalist id="tagList">${allTags().map(t => `<option value="${esc(t)}">`).join('')}</datalist></div>
      </div>
      <div class="modal-foot"><button class="btn" data-close>Annuler</button><button class="btn btn-primary" id="bulkTagOk">Appliquer</button></div>`);
    $('#bulkTagName').focus();
    $('#bulkTagOk').onclick = () => {
      const tag = $('#bulkTagName').value.trim();
      if (!tag) return;
      selectedContacts.forEach(id => { const c = contactById(id); if (c && !(c.tags || []).includes(tag)) c.tags = [...(c.tags || []), tag]; });
      closeModal(); selectedContacts.clear(); commit(); renderBulkbar();
      toast('Tag « ' + tag + ' » appliqué');
    };
  };
}

function bulkDeleteContacts() {
  const ids = [...selectedContacts];
  const snapshot = JSON.stringify({ contacts: S.contacts, deals: S.deals, activities: S.activities });
  ids.forEach(removeContactCascade);
  selectedContacts.clear();
  commit(); renderBulkbar();
  toast(ids.length + ' contact(s) supprimé(s)', () => {
    const snap = JSON.parse(snapshot);
    S.contacts = snap.contacts; S.deals = snap.deals; S.activities = snap.activities;
    commit();
  });
}
function removeContactCascade(cid) {
  S.deals = S.deals.filter(d => d.contactId !== cid);
  S.activities = S.activities.filter(a => a.contactId !== cid);
  S.contacts = S.contacts.filter(c => c.id !== cid);
}

/* ============================================================
   10. FICHE CONTACT — modale de création / édition
   ============================================================ */
function openContactModal(contactId, onDone) {
  const c = contactId ? contactById(contactId) : null;
  openModal(`
    <div class="modal-head"><h2>${c ? 'Modifier la fiche' : 'Nouveau contact'}</h2></div>
    <div class="modal-body">
      <div class="form-row">
        <div class="field"><label>Nom *</label><input class="input" id="fName" value="${esc(c ? c.name : '')}" placeholder="Marie Lefort" autocomplete="off"></div>
        <div class="field"><label>Société <span class="opt">optionnel</span></label><input class="input" id="fCompany" value="${esc(c ? c.company || '' : '')}" placeholder="Atelier Lefort"></div>
      </div>
      <div class="form-row">
        <div class="field"><label>Email <span class="opt">optionnel</span></label><input class="input" id="fEmail" type="email" value="${esc(c ? c.email || '' : '')}" autocomplete="off"></div>
        <div class="field"><label>Téléphone <span class="opt">optionnel</span></label><input class="input" id="fPhone" value="${esc(c ? c.phone || '' : '')}" autocomplete="off"></div>
      </div>
      <div class="field"><label>Tags <span class="opt">séparés par des virgules</span></label><input class="input" id="fTags" value="${esc(c ? (c.tags || []).join(', ') : '')}" placeholder="prospect, salon-2026"></div>
      <div id="dupWarn"></div>
      <details class="fold">
        <summary>Infos entreprise &amp; notes</summary>
        <div class="fold-body" style="display:flex;flex-direction:column;gap:10px">
          <div class="form-row">
            <div class="field"><label>SIRET</label><input class="input mono" id="fSiret" value="${esc(c ? c.siret || '' : '')}" maxlength="17" placeholder="14 chiffres"></div>
            <div class="field"><label>TVA intracommunautaire</label><input class="input mono" id="fTva" value="${esc(c ? c.tva || '' : '')}" placeholder="FR…"></div>
          </div>
          <div class="field"><label>Notes</label><textarea class="textarea" id="fNote">${esc(c ? c.note || '' : '')}</textarea></div>
        </div>
      </details>
    </div>
    <div class="modal-foot">
      ${c ? '<button class="btn btn-danger left" id="fDelete">Supprimer</button>' : ''}
      <button class="btn" data-close>Annuler</button>
      <button class="btn btn-primary" id="fSave">${c ? 'Enregistrer' : 'Créer la fiche'}</button>
    </div>`);
  $('#fName').focus();

  const checkDup = () => {
    const dup = findDuplicate({ email: $('#fEmail').value, phone: $('#fPhone').value }, contactId);
    $('#dupWarn').innerHTML = dup ? `<div class="field-warn">⚠ Doublon possible : <a data-opendup="${dup.id}">${esc(dup.name)}${dup.company ? ' · ' + esc(dup.company) : ''}</a> a le même email ou téléphone.</div>` : '';
    const link = $('[data-opendup]');
    if (link) link.onclick = () => { closeModal(); openContactDrawer(link.dataset.opendup); };
  };
  $('#fEmail').addEventListener('blur', checkDup);
  $('#fPhone').addEventListener('blur', checkDup);

  const save = () => {
    const name = $('#fName').value.trim();
    if (!name) { $('#fName').focus(); return; }
    const siretRaw = $('#fSiret').value.replace(/\s/g, '');
    if (siretRaw && !/^\d{14}$/.test(siretRaw)) { toast('SIRET : 14 chiffres attendus (champ laissé tel quel)'); }
    const data = {
      name,
      company: $('#fCompany').value.trim(),
      email: $('#fEmail').value.trim(),
      phone: $('#fPhone').value.trim(),
      tags: $('#fTags').value.split(',').map(s => s.trim()).filter(Boolean),
      siret: $('#fSiret').value.trim(),
      tva: $('#fTva').value.trim(),
      note: $('#fNote').value,
    };
    let saved;
    if (c) { Object.assign(c, data); saved = c; }
    else { saved = Object.assign({ id: uid(), createdAt: new Date().toISOString() }, data); S.contacts.push(saved); }
    closeModal(); commit();
    if (c && drawerOpen) openContactDrawer(c.id);
    if (onDone) onDone(saved);
    else toast(c ? 'Fiche enregistrée' : 'Contact créé');
  };
  $('#fSave').onclick = save;
  $('#modalRoot .modal-inner').addEventListener('keydown', function onk(e) {
    if (e.key === 'Enter' && e.target.tagName !== 'TEXTAREA' && !e.target.closest('details')) { e.preventDefault(); save(); }
  });
  const del = $('#fDelete');
  if (del) del.onclick = () => {
    const snapshot = JSON.stringify({ contacts: S.contacts, deals: S.deals, activities: S.activities });
    removeContactCascade(c.id);
    closeModal(); closeDrawer(); commit();
    toast('Contact supprimé (affaires et notes incluses)', () => {
      const snap = JSON.parse(snapshot);
      S.contacts = snap.contacts; S.deals = snap.deals; S.activities = snap.activities;
      commit();
    });
  };
}

/* ============================================================
   11. NOUVELLE AFFAIRE — création rapide
   ============================================================ */
function openQuickAdd(preset = {}) {
  const stages = S.settings.stages;
  openModal(`
    <div class="modal-head"><h2>Nouvelle affaire</h2></div>
    <div class="modal-body">
      <div class="field">
        <label>Contact *</label>
        <input class="input" id="qContact" list="qContactList" placeholder="Nom du contact — tapez pour chercher ou créer" autocomplete="off">
        <datalist id="qContactList">
          ${S.contacts.map(c => `<option value="${esc(c.name)}${c.company ? ' — ' + esc(c.company) : ''}">`).join('')}
        </datalist>
        <span class="field-hint" id="qContactHint"></span>
      </div>
      <div class="form-row">
        <div class="field"><label>Société <span class="opt">si nouveau contact</span></label><input class="input" id="qCompany" placeholder="" autocomplete="off"></div>
        <div class="field"><label>Montant estimé (€ HT)</label><input class="input" id="qValue" type="number" min="0" step="50" placeholder="2 500"></div>
      </div>
      <div class="form-row">
        <div class="field"><label>Intitulé <span class="opt">optionnel</span></label><input class="input" id="qTitle" placeholder="Refonte site vitrine"></div>
        <div class="field"><label>Étape</label>
          <select class="select" id="qStage">${stages.map(s => `<option value="${s.id}" ${preset.stageId === s.id ? 'selected' : ''}>${esc(s.name)}</option>`).join('')}</select>
        </div>
      </div>
      <div class="form-row">
        <div class="field"><label>Prochaine action</label>
          <select class="select" id="qKind">${Object.entries(ACTION_KINDS).map(([k, v]) => `<option value="${k}">${v}</option>`).join('')}</select>
        </div>
        <div class="field"><label>Pour le</label><input class="input" id="qDate" type="date" value="${addDays(today(), 3)}"></div>
      </div>
    </div>
    <div class="modal-foot">
      <span class="left muted" style="font-size:11.5px">Seul le contact est obligatoire.</span>
      <button class="btn" data-close>Annuler</button>
      <button class="btn btn-primary" id="qSave">Créer l’affaire</button>
    </div>`);
  const qc = $('#qContact');
  qc.focus();
  const matchContact = () => {
    const full = qc.value.trim();
    const raw = qc.value.split('—')[0].trim();
    const found = S.contacts.find(x => norm(x.name + (x.company ? ' — ' + x.company : '')) === norm(full))
      || S.contacts.find(x => norm(x.name) === norm(raw));
    $('#qContactHint').textContent = found ? 'Contact existant — l’affaire sera rattachée à sa fiche.' : (raw ? 'Nouveau contact « ' + raw + ' » — la fiche sera créée.' : '');
    if (found && found.company) $('#qCompany').value = found.company;
    return found;
  };
  qc.addEventListener('input', matchContact);
  const save = () => {
    const full = qc.value.trim();
    const raw = qc.value.split('—')[0].trim();
    if (!raw) { qc.focus(); return; }
    let contact = S.contacts.find(x => norm(x.name + (x.company ? ' — ' + x.company : '')) === norm(full))
      || S.contacts.find(x => norm(x.name) === norm(raw));
    if (!contact) {
      contact = { id: uid(), name: raw, company: $('#qCompany').value.trim(), email: '', phone: '', tags: [], createdAt: new Date().toISOString() };
      S.contacts.push(contact);
    }
    const now = new Date().toISOString();
    const stageId = $('#qStage').value;
    const deal = {
      id: uid(),
      title: $('#qTitle').value.trim() || 'Affaire — ' + (contact.company || contact.name),
      contactId: contact.id,
      value: Number($('#qValue').value) || 0,
      stageId, prob: null,
      status: 'open', lostReason: null,
      createdAt: now, closedAt: null, lastActivityAt: now,
      stageHistory: [{ stageId, at: now }],
      next: { kind: $('#qKind').value, label: '', date: $('#qDate').value || addDays(today(), 3) },
    };
    S.deals.push(deal);
    addActivity({ dealId: deal.id, contactId: contact.id, type: 'systeme', text: 'Affaire créée' });
    closeModal(); commit();
    toast('Affaire créée — relance ' + relDay(deal.next.date));
  };
  $('#qSave').onclick = save;
  $('#modalRoot .modal-inner').addEventListener('keydown', function onk(e) {
    if (e.key !== 'Enter' || e.target.tagName === 'TEXTAREA') return;
    e.preventDefault();
    if (e.target === qc) { matchContact(); $('#qValue').focus(); return; } // Entrée valide la datalist, ne crée rien
    save();
  });
}
</script>

<script>
'use strict';

/* ============================================================
   12. MODALES & TIROIRS — helpers
   ============================================================ */
function openModal(html) {
  const m = $('#modalRoot');
  m.innerHTML = `<div class="modal-inner">${html}</div>`;
  if (!m.open) m.showModal();
  $$('[data-close]', m).forEach(b => b.onclick = () => closeModal());
}
// La fermeture native (Échap) doit nettoyer autant que closeModal()
$('#modalRoot').addEventListener('close', () => {
  const m = $('#modalRoot');
  m.innerHTML = '';
  m.classList.remove('lg');
});
function closeModal() {
  const m = $('#modalRoot');
  if (m.open) m.close();
  m.innerHTML = '';
  m.classList.remove('lg');
}

let drawerOpen = false;
let drawerReturnFocus = null;
function openDrawer(html) {
  const prevReturn = drawerReturnFocus;
  closeDrawer(true);
  const active = document.activeElement;
  drawerReturnFocus = (active && active !== document.body) ? active : prevReturn;
  const root = $('#overlayRoot');
  root.insertAdjacentHTML('beforeend', `
    <div class="drawer-veil" id="drawerVeil"></div>
    <aside class="drawer" id="drawerEl" role="dialog" aria-modal="true" tabindex="-1" aria-labelledby="drawerTitle">${html}</aside>`);
  const d = $('#drawerEl');
  const h2 = d.querySelector('.drawer-head h2');
  if (h2) h2.id = 'drawerTitle'; else d.setAttribute('aria-label', 'Détail');
  requestAnimationFrame(() => {
    const v = $('#drawerVeil');
    if (v) v.classList.add('open');
    d.classList.add('open');
  });
  d.focus();
  d.addEventListener('keydown', e => {
    if (e.key !== 'Tab') return;
    const f = [...d.querySelectorAll('button, [href], input, select, textarea, [tabindex]:not([tabindex="-1"])')]
      .filter(el => !el.disabled && el.offsetParent !== null);
    if (!f.length) { e.preventDefault(); return; }
    const first = f[0], last = f[f.length - 1];
    if (e.shiftKey && (document.activeElement === first || document.activeElement === d)) { e.preventDefault(); last.focus(); }
    else if (!e.shiftKey && document.activeElement === last) { e.preventDefault(); first.focus(); }
  });
  $('#drawerVeil').onclick = () => closeDrawer();
  drawerOpen = true;
}
function closeDrawer(instant = false) {
  const v = $('#drawerVeil'), d = $('#drawerEl');
  if (!v && !d) { drawerOpen = false; return; }
  if (instant) { v && v.remove(); d && d.remove(); }
  else {
    v && v.classList.remove('open');
    d && d.classList.remove('open');
    setTimeout(() => { v && v.remove(); d && d.remove(); }, 200);
    if (drawerReturnFocus && drawerReturnFocus.isConnected) drawerReturnFocus.focus();
    drawerReturnFocus = null;
  }
  drawerOpen = false;
}

/* ============================================================
   13. TIROIR AFFAIRE
   ============================================================ */
function openDealDrawer(dealId) {
  const d = dealById(dealId);
  if (!d) return;
  const c = contactById(d.contactId);
  const st = stageById(d.stageId);
  const alert = dealAlert(d);
  const tc = touchCount(d);
  const acts = actsOfDeal(d.id);
  const isOpen = d.status === 'open';
  const ageDays = Math.max(0, Math.round((new Date() - new Date(d.createdAt)) / 864e5));

  openDrawer(`
    <div class="drawer-head">
      <div style="flex:1;min-width:0">
        <h2>${esc(d.title)}</h2>
        <div class="sub">
          ${isOpen ? `<span class="chip ${alert === 'late' ? 'red' : alert === 'sleep' || alert === 'noaction' ? 'amber' : ''}">${st ? esc(st.name) : ''}</span>` :
            `<span class="chip ${d.status === 'won' ? 'green' : ''}">${d.status === 'won' ? 'Gagnée' : 'Perdue' + (d.lostReason ? ' · ' + esc(d.lostReason) : '')}</span>`}
          ${tc ? `<span class="chip">relance n°${tc + 1}</span>` : ''}
          <span>créée ${relPast(d.createdAt)} · ${ageDays} j</span>
        </div>
      </div>
      <button class="iconbtn" id="dwClose" aria-label="Fermer">✕</button>
    </div>
    <div class="drawer-body">
      <div class="drawer-grid">
        <div class="kv"><span class="k">Contact</span><span class="v"><a data-goto-contact="${d.contactId}" tabindex="0" style="cursor:pointer">${esc(c ? c.name : '?')}</a>${c && c.company ? ' · ' + esc(c.company) : ''}</span></div>
        <div class="kv"><span class="k">Montant (€ HT)</span><span class="v"><span class="cell-edit money" id="dwValue">${d.value ? fmtEUR(d.value) : 'cliquer pour saisir'}</span></span></div>
        <div class="kv"><span class="k">Étape</span><span class="v">
          <select class="select" id="dwStage" ${isOpen ? '' : 'disabled'} style="padding:4px 8px">
            ${S.settings.stages.map(s => `<option value="${s.id}" ${s.id === d.stageId ? 'selected' : ''}>${esc(s.name)}</option>`).join('')}
          </select></span></div>
        <div class="kv"><span class="k">Probabilité</span><span class="v">
          <input class="input mono" id="dwProb" type="number" min="0" max="100" style="width:80px;padding:4px 8px" value="${d.prob != null && d.prob !== '' ? d.prob : ''}" placeholder="${st ? st.prob : 100}" ${isOpen ? '' : 'disabled'}>
          <span class="muted" style="font-size:11px">% — vide = étape · pondéré ${fmtEUR(dealWeighted(d))}</span></span></div>
      </div>

      ${isOpen ? `
      <div style="margin-top:16px;padding:12px 14px;border:1px solid var(--hairline);border-radius:10px;background:var(--surface-2)">
        <div class="eyebrow" style="margin-bottom:8px">Prochaine action</div>
        <div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap">
          <select class="select" id="dwKind" style="width:auto">
            ${Object.entries(ACTION_KINDS).map(([k, v]) => `<option value="${k}" ${d.next && d.next.kind === k ? 'selected' : ''}>${v}</option>`).join('')}
          </select>
          <input class="input" id="dwNextDate" type="date" style="width:auto" value="${d.next && d.next.date ? d.next.date : ''}">
          <input class="input" id="dwNextLabel" placeholder="détail (optionnel)" style="flex:1;min-width:120px" value="${esc(d.next && d.next.label ? d.next.label : '')}">
          <button class="btn btn-sm btn-primary" id="dwNextSave">OK</button>
        </div>
        <div style="display:flex;gap:6px;margin-top:8px;flex-wrap:wrap">
          <button class="btn btn-xs" data-preset="1">Demain</button>
          <button class="btn btn-xs" data-preset="3">+3 j</button>
          <button class="btn btn-xs" data-preset="7">+7 j</button>
          <button class="btn btn-xs" data-preset="monday">Lundi</button>
          ${d.next ? '<button class="btn btn-xs" id="dwNextClear">Retirer</button>' : ''}
        </div>
      </div>` : ''}

      <div style="display:flex;gap:8px;margin-top:14px;flex-wrap:wrap">
        ${isOpen ? `
          ${c && c.email ? `<button class="btn btn-sm" id="dwEmail">✉ Relancer par email</button>` : ''}
          ${c && c.phone ? `<a class="btn btn-sm" href="tel:${esc(String(c.phone).replace(/\s/g, ''))}">✆ Appeler</a>` : ''}
          <button class="btn btn-sm" id="dwWon" style="color:var(--green)">✓ Gagnée</button>
          <button class="btn btn-sm" id="dwLost">Perdue</button>` : `
          <button class="btn btn-sm" id="dwReopen">Rouvrir l’affaire</button>`}
        <span style="flex:1"></span>
        <button class="btn btn-sm btn-danger" id="dwDelete">Supprimer</button>
      </div>

      <details class="fold" open>
        <summary>Fil de l’affaire <span class="muted mono" style="font-size:10px">(${acts.length})</span></summary>
        <div class="fold-body">
          <div class="tl-add">
            <div class="tl-typesel" id="dwActType">
              <button data-t="note" class="on">Note</button><button data-t="appel">Appel</button><button data-t="email">Email</button><button data-t="rdv">RDV</button>
            </div>
            <input class="input" id="dwActText" placeholder="Consigner en 5 secondes… (Entrée)">
          </div>
          <div class="tl">${acts.map(tlItem).join('') || '<span class="muted" style="font-size:12px">Aucune activité pour l’instant.</span>'}</div>
        </div>
      </details>
    </div>`);

  $('#dwClose').onclick = () => closeDrawer();
  const gc = $('[data-goto-contact]');
  if (gc) {
    gc.onclick = () => openContactDrawer(gc.dataset.gotoContact);
    gc.onkeydown = e => { if (e.key === 'Enter') openContactDrawer(gc.dataset.gotoContact); };
  }

  /* montant : édition inline */
  $('#dwValue').onclick = function () {
    if (this.querySelector('input')) return;
    this.innerHTML = `<input type="number" min="0" step="50" value="${Number(d.value) || ''}" style="width:110px">`;
    const i = $('input', this);
    i.focus(); i.select();
    const fin = save => {
      if (save) { d.value = Number(i.value) || 0; d.lastActivityAt = new Date().toISOString(); persist(); }
      openDealDrawer(d.id);
    };
    i.addEventListener('keydown', e => { if (e.key === 'Enter') fin(true); if (e.key === 'Escape') fin(false); });
    i.addEventListener('blur', () => fin(true));
  };

  const stageSel = $('#dwStage');
  if (stageSel && isOpen) stageSel.onchange = () => { moveDealToStage(d.id, stageSel.value); openDealDrawer(d.id); };
  const probIn = $('#dwProb');
  if (probIn && isOpen) probIn.onchange = () => {
    d.prob = probIn.value === '' ? null : Math.max(0, Math.min(100, Number(probIn.value)));
    persist(); openDealDrawer(d.id);
  };

  if (isOpen) {
    const saveNext = () => {
      const date = $('#dwNextDate').value;
      if (!date) { $('#dwNextDate').focus(); return; }
      d.next = { kind: $('#dwKind').value, label: $('#dwNextLabel').value.trim(), date };
      commit(); openDealDrawer(d.id);
    };
    $('#dwNextSave').onclick = saveNext;
    $$('[data-preset]').forEach(b => b.onclick = () => {
      $('#dwNextDate').value = b.dataset.preset === 'monday' ? nextMonday() : addDays(today(), Number(b.dataset.preset));
    });
    const nc = $('#dwNextClear');
    if (nc) nc.onclick = () => { d.next = null; commit(); openDealDrawer(d.id); };
    $('#dwWon').onclick = () => openCloseDeal(d.id, 'won');
    $('#dwLost').onclick = () => openCloseDeal(d.id, 'lost');
    const em = $('#dwEmail');
    if (em) em.onclick = () => openEmailModal(d);
  } else {
    $('#dwReopen').onclick = () => { const last = d.stageHistory[d.stageHistory.length - 1]; moveDealToStage(d.id, stageById(last && last.stageId) ? last.stageId : S.settings.stages[0].id); openDealDrawer(d.id); };
  }

  $('#dwDelete').onclick = () => {
    const snapshot = JSON.stringify({ deals: S.deals, activities: S.activities });
    S.deals = S.deals.filter(x => x.id !== d.id);
    S.activities = S.activities.filter(a => a.dealId !== d.id);
    closeDrawer(); commit();
    toast('Affaire supprimée', () => {
      const snap = JSON.parse(snapshot);
      S.deals = snap.deals; S.activities = snap.activities;
      commit();
    });
  };

  /* ajout d'activité */
  let actType = 'note';
  $$('#dwActType button').forEach(b => b.onclick = () => {
    actType = b.dataset.t;
    $$('#dwActType button').forEach(x => x.classList.toggle('on', x === b));
    $('#dwActText').focus();
  });
  $('#dwActText').addEventListener('keydown', e => {
    if (e.key !== 'Enter') return;
    const text = e.target.value.trim();
    if (!text) return;
    addActivity({ dealId: d.id, contactId: d.contactId, type: actType, text });
    commit(); openDealDrawer(d.id);
    setTimeout(() => { const i = $('#dwActText'); if (i) i.focus(); }, 60);
  });
}

function tlItem(a) {
  return `
    <div class="tl-item type-${esc(a.type)}">
      <div class="tl-rail"><span class="p"></span><span class="l"></span></div>
      <div class="tl-body">
        <div class="tl-meta"><span>${esc(ACT_TYPES[a.type] || a.type)}</span><span>${fmtFull(a.at)} · ${dfTime.format(new Date(a.at))}</span></div>
        <div class="tl-text">${esc(a.text)}</div>
      </div>
    </div>`;
}

/* ============================================================
   14. TIROIR CONTACT
   ============================================================ */
function openContactDrawer(contactId) {
  const c = contactById(contactId);
  if (!c) return;
  const deals = dealsOfContact(c.id).sort((a, b) => b.createdAt.localeCompare(a.createdAt));
  const open = deals.filter(d => d.status === 'open');
  const acts = actsOfContact(c.id);
  const inactive3y = !acts.length ? daysSince(c.createdAt) > 1095 : daysSince(acts[0].at) > 1095;

  openDrawer(`
    <div class="drawer-head">
      <div style="flex:1;min-width:0">
        <h2>${esc(c.name)}</h2>
        <div class="sub">
          ${c.company ? `<span>${esc(c.company)}</span>` : ''}
          ${(c.tags || []).map(t => `<span class="chip">${esc(t)}</span>`).join('')}
          ${inactive3y ? '<span class="chip amber" title="Aucune interaction depuis plus de 3 ans — pensez à la purge RGPD (Réglages)">inactif 3 ans+</span>' : ''}
        </div>
      </div>
      <button class="iconbtn" id="cwEdit" title="Modifier la fiche" aria-label="Modifier">✎</button>
      <button class="iconbtn" id="cwClose" aria-label="Fermer">✕</button>
    </div>
    <div class="drawer-body">
      <div class="drawer-grid">
        <div class="kv"><span class="k">Email</span><span class="v">${c.email ? `<a href="mailto:${esc(c.email)}">${esc(c.email)}</a>` : '<span class="muted">—</span>'}</span></div>
        <div class="kv"><span class="k">Téléphone</span><span class="v">${c.phone ? `<a href="tel:${esc(String(c.phone).replace(/\s/g, ''))}" class="mono" style="font-size:12.5px">${esc(fmtPhone(c.phone))}</a>` : '<span class="muted">—</span>'}</span></div>
        ${c.siret ? `<div class="kv"><span class="k">SIRET</span><span class="v mono" style="font-size:12px">${esc(c.siret)}</span></div>` : ''}
        ${c.tva ? `<div class="kv"><span class="k">TVA intra.</span><span class="v mono" style="font-size:12px">${esc(c.tva)}</span></div>` : ''}
        <div class="kv"><span class="k">Fiche créée</span><span class="v">${relPast(c.createdAt)}</span></div>
        <div class="kv"><span class="k">Dernier échange</span><span class="v">${acts.length ? relPast(acts[0].at) : 'jamais'}</span></div>

      <div style="display:flex;gap:8px;margin-top:14px;flex-wrap:wrap">
        <button class="btn btn-sm btn-primary" id="cwNewDeal">+ Affaire pour ce contact</button>
      </div>

      <details class="fold" open>
        <summary>Affaires <span class="muted mono" style="font-size:10px">(${deals.length})</span></summary>
        <div class="fold-body" style="display:flex;flex-direction:column;gap:8px">
          ${deals.map(d => {
            const st = stageById(d.stageId);
            const badge = d.status === 'won' ? '<span class="chip green">gagnée</span>' : d.status === 'lost' ? '<span class="chip">perdue</span>' : `<span class="chip">${st ? esc(st.name) : ''}</span>`;
            return `<div class="task-row" data-deal="${d.id}" style="border:1px solid var(--hairline);border-radius:10px">
              <div class="task-main"><div class="task-title"><span class="who">${esc(d.title)}</span></div>
              <div class="task-sub">${badge}${d.next && d.status === 'open' ? '<span>→ ' + esc(ACTION_KINDS[d.next.kind] || '') + ' ' + relDay(d.next.date) + '</span>' : ''}</div></div>
              <span class="money muted">${d.value ? fmtEUR(d.value) : ''}</span>
            </div>`;
          }).join('') || '<span class="muted" style="font-size:12px">Aucune affaire.</span>'}
        </div>
      </details>

      <details class="fold" open>
        <summary>Historique <span class="muted mono" style="font-size:10px">(${acts.length})</span></summary>
        <div class="fold-body">
          <div class="tl-add">
            <input class="input" id="cwNote" placeholder="Ajouter une note… (Entrée)">
          </div>
          <div class="tl">${acts.slice(0, 40).map(tlItem).join('') || '<span class="muted" style="font-size:12px">Aucune activité.</span>'}</div>
        </div>
      </details>
    </div>`);

  $('#cwClose').onclick = () => closeDrawer();
  $('#cwEdit').onclick = () => openContactModal(c.id);
  $('#cwNewDeal').onclick = () => { closeDrawer(); openQuickAddForContact(c); };
  $$('.drawer [data-deal]').forEach(row => row.onclick = () => openDealDrawer(row.dataset.deal));
  $('#cwNote').addEventListener('keydown', e => {
    if (e.key !== 'Enter') return;
    const text = e.target.value.trim();
    if (!text) return;
    addActivity({ contactId: c.id, type: 'note', text });
    commit(); openContactDrawer(c.id);
  });
}

function openQuickAddForContact(c) {
  openQuickAdd();
  const qc = $('#qContact');
  if (qc) { qc.value = c.name; qc.dispatchEvent(new Event('input')); $('#qValue') && $('#qValue').focus(); }
}

/* ============================================================
   15. EMAIL DE RELANCE — modèles + mailto + consignation
   ============================================================ */
function fillTemplate(str, d, c) {
  const first = (c && c.name ? c.name.split(' ')[0] : '');
  return String(str || '')
    .replaceAll('{prenom}', first)
    .replaceAll('{nom}', c ? c.name : '')
    .replaceAll('{societe}', c && c.company ? c.company : 'votre entreprise')
    .replaceAll('{montant}', d && d.value ? fmtEUR(d.value) : '');
}
function openEmailModal(d) {
  const c = contactById(d.contactId);
  if (!c || !c.email) return;
  const tpls = S.settings.emailTemplates;
  openModal(`
    <div class="modal-head"><h2>Relancer ${esc(c.name)} par email</h2></div>
    <div class="modal-body">
      <div class="field"><label>Modèle</label>
        <select class="select" id="emTpl">${tpls.map((t, i) => `<option value="${i}">${esc(t.name)}</option>`).join('')}</select>
      </div>
      <div class="field"><label>Objet</label><input class="input" id="emSubject"></div>
      <div class="field"><label>Message</label><textarea class="textarea" id="emBody" rows="8"></textarea></div>
      <span class="field-hint">S’ouvre dans votre logiciel email habituel. Rien n’est envoyé par Cadence.</span>
    </div>
    <div class="modal-foot">
      <button class="btn" data-close>Annuler</button>
      <button class="btn btn-primary" id="emSend">Ouvrir dans mon email</button>
    </div>`);
  const apply = () => {
    const t = tpls[Number($('#emTpl').value)] || tpls[0];
    $('#emSubject').value = fillTemplate(t.subject, d, c);
    $('#emBody').value = fillTemplate(t.body, d, c);
  };
  apply();
  $('#emTpl').onchange = apply;
  $('#emSend').onclick = () => {
    const subject = $('#emSubject').value, body = $('#emBody').value;
    window.location.href = 'mailto:' + encodeURIComponent(c.email) + '?subject=' + encodeURIComponent(subject) + '&body=' + encodeURIComponent(body);
    addActivity({ dealId: d.id, contactId: c.id, type: 'email', text: 'Email de relance : ' + subject });
    const delay = suggestedDelay(d);
    d.next = { kind: 'relance', label: 'suite email', date: addDays(today(), delay) };
    closeModal(); commit();
    toast('Email consigné — prochaine relance ' + relDay(d.next.date));
    openDealDrawer(d.id);
  };
}
</script>

<script>
'use strict';

/* ============================================================
   16. VUE STATISTIQUES — 6 tuiles fixes + 3 graphiques sobres
   ============================================================ */
function renderStats(view) {
  const t = pipelineTotals();
  const s = statsData();
  const sleeping = sleepDeals().length;
  const open = openDeals();

  const deltaMonth = (() => {
    if (!s.wonPrevMonth && !t.wonMonth) return '';
    if (!s.wonPrevMonth) return '<span class="up">nouveau</span> vs mois dernier';
    const pct = Math.round(100 * (t.wonMonth - s.wonPrevMonth) / s.wonPrevMonth);
    if (pct === 0) return 'stable vs mois dernier';
    return `<span class="${pct > 0 ? 'up' : 'down'}">${pct > 0 ? '+' : ''}${pct}&nbsp;%</span> vs mois dernier (${fmtEUR(s.wonPrevMonth)})`;
  })();

  view.innerHTML = `
    <div class="stat-grid">
      <div class="card stat-tile">
        <span class="l">Pipeline pondéré</span>
        <span class="v money">${fmtEUR(t.pond)}</span>
        <span class="d">brut ${fmtEUR(t.brut)} · ${open.length} affaire${open.length > 1 ? 's' : ''} en cours</span>
      </div>
      <div class="card stat-tile">
        <span class="l">Gagné ce mois</span>
        <span class="v money">${fmtEUR(t.wonMonth)}</span>
        <span class="d">${deltaMonth}</span>
      </div>
      <div class="card stat-tile">
        <span class="l">Taux de transformation</span>
        ${s.winRate != null
          ? `<span class="v">${s.winRate}&nbsp;%</span><span class="d">${s.won.length} gagnée${s.won.length > 1 ? 's' : ''} / ${s.closed.length} closes</span>`
          : `<span class="v small">Encore ${5 - s.closed.length} affaire${5 - s.closed.length > 1 ? 's' : ''} close${5 - s.closed.length > 1 ? 's' : ''}</span><span class="d">avant un taux fiable</span>`}
      </div>
      <div class="card stat-tile">
        <span class="l">Panier moyen</span>
        ${s.avgBasket != null
          ? `<span class="v money">${fmtEUR(s.avgBasket)}</span><span class="d">sur ${s.won.length} affaires gagnées</span>`
          : `<span class="v small">Encore ${Math.max(0, 3 - s.won.length)} affaire${3 - s.won.length > 1 ? 's' : ''} gagnée${3 - s.won.length > 1 ? 's' : ''}</span><span class="d">avant ce calcul</span>`}
      </div>
      <div class="card stat-tile">
        <span class="l">Cycle de vente moyen</span>
        ${s.avgCycle != null
          ? `<span class="v">${s.avgCycle}&nbsp;j</span><span class="d">de la création à la signature</span>`
          : `<span class="v small">Pas encore mesurable</span><span class="d">3 affaires gagnées minimum</span>`}
      </div>
      <div class="card stat-tile click" id="tileSleep">
        <span class="l">Affaires dormantes</span>
        <span class="v" style="${sleeping ? 'color:var(--amber)' : ''}">${sleeping}</span>
        <span class="d">${sleeping ? 'sans activité depuis trop longtemps — cliquer pour voir' : 'tout le pipeline est actif'}</span>
      </div>
    </div>

    <div class="chart-grid">
      <div class="card chart-card">
        <h3>Entonnoir de conversion</h3>
        <div class="sub">part des affaires ayant atteint chaque étape</div>
        ${s.all >= 5 ? funnelChart(s) : `<div class="chart-empty">L’entonnoir apparaîtra à partir de 5 affaires créées.<br>Il vous dira où votre processus de vente fuit.</div>`}
      </div>
      <div class="card chart-card">
        <h3>Chiffre d’affaires signé</h3>
        <div class="sub">6 derniers mois, € HT</div>
        ${s.won.length ? monthsChart(s) : `<div class="chart-empty">Votre première affaire gagnée démarrera cette courbe.</div>`}
      </div>
      <div class="card chart-card">
        <h3>Raisons de perte</h3>
        <div class="sub">pourquoi les affaires se perdent — 40 à 60 % des affaires B2B se perdent sans décision du client</div>
        ${s.lost.length >= 3 ? lossChart(s) : `<div class="chart-empty">À partir de 3 affaires perdues, ce graphique vous dira contre quoi vous perdez vraiment.<br>(Indice du marché : plus souvent « pas de décision » qu’un concurrent.)</div>`}
      </div>
    </div>`;
  $('#tileSleep').onclick = () => go('pipeline');
  bindVizTips(view);
}

/* ---------- entonnoir : barres horizontales, rampe ordinale bleue ---------- */
function funnelChart(s) {
  const clip = n => n.length > 17 ? n.slice(0, 16) + '…' : n; // le nom complet reste dans l'infobulle et la table
  const rows = s.funnel;
  const max = Math.max(1, ...rows.map(r => r.n));
  const W = 520, LBL = 130, BARMAX = W - LBL - 78, RH = 34;
  const H = rows.length * RH + 6;
  const ramps = ['var(--chart-o1)', 'var(--chart-o2)', 'var(--chart-o3)', 'var(--chart-o4)'];
  const bars = rows.map((r, i) => {
    const w = Math.max(2, Math.round(BARMAX * r.n / max));
    const y = i * RH + 4;
    const color = r.stage.id === '__won' ? 'var(--green)' : ramps[Math.min(i, ramps.length - 1)];
    const pct = s.all ? Math.round(100 * r.n / s.all) : 0;
    return `
      <text x="${LBL - 8}" y="${y + 17}" text-anchor="end" font-size="11.5" fill="var(--ink-2)">${esc(clip(r.stage.name))}</text>
      <rect x="${LBL}" y="${y}" width="${w}" height="22" rx="4" fill="${color}"
        data-tip="${esc(r.stage.name)} — ${r.n} affaire${r.n > 1 ? 's' : ''} (${pct} %)"></rect>
      <text x="${LBL + w + 8}" y="${y + 16}" font-size="11" fill="var(--ink-3)" style="font-family:var(--mono)">${r.n} · ${pct} %</text>`;
  }).join('');
  return `
    <svg viewBox="0 0 ${W} ${H}" role="img" aria-label="Entonnoir de conversion par étape">${bars}</svg>
    ${chartTable(['Étape', 'Affaires'], rows.map(r => [r.stage.name, String(r.n)]))}`;
}

/* ---------- CA par mois : colonnes fines, une seule série ---------- */
function monthsChart(s) {
  const W = 520, H = 190, PADL = 56, PADB = 26, PADT = 14;
  const plotW = W - PADL - 12, plotH = H - PADT - PADB;
  const max = Math.max(1, ...s.months.map(m => m.total));
  const step = niceStep(max);
  const top = Math.ceil(max / step) * step;
  const band = plotW / s.months.length;
  const bw = Math.min(24, band * .5);
  const maxIdx = s.months.reduce((bi, m, i) => m.total > s.months[bi].total ? i : bi, 0);
  const grid = [];
  for (let v = 0; v <= top; v += step) {
    const y = PADT + plotH - plotH * v / top;
    grid.push(`<line x1="${PADL}" y1="${y}" x2="${W - 12}" y2="${y}" stroke="var(--hairline)" stroke-width="1"></line>
      <text x="${PADL - 6}" y="${y + 3.5}" text-anchor="end" font-size="10" fill="var(--ink-3)" style="font-family:var(--mono)">${compactEUR(v)}</text>`);
  }
  const bars = s.months.map((m, i) => {
    const h = Math.round(plotH * m.total / top);
    const x = PADL + band * i + (band - bw) / 2;
    const y = PADT + plotH - h;
    const lbl = (m.total > 0 && (i === maxIdx || i === s.months.length - 1))
      ? `<text x="${x + bw / 2}" y="${y - 5}" text-anchor="middle" font-size="10" fill="var(--ink-2)" style="font-family:var(--mono)">${compactEUR(m.total)}</text>` : '';
    return `
      <rect x="${x}" y="${y}" width="${bw}" height="${Math.max(h, m.total > 0 ? 2 : 0)}" rx="4" fill="var(--chart-1)"
        data-tip="${esc(m.label)} — ${fmtEUR(m.total)}"></rect>${lbl}
      <text x="${x + bw / 2}" y="${H - 8}" text-anchor="middle" font-size="10.5" fill="var(--ink-3)">${esc(m.label)}</text>`;
  }).join('');
  return `
    <svg viewBox="0 0 ${W} ${H}" role="img" aria-label="Chiffre d'affaires signé par mois">
      ${grid.join('')}
      <line x1="${PADL}" y1="${PADT + plotH}" x2="${W - 12}" y2="${PADT + plotH}" stroke="var(--hairline-2)" stroke-width="1"></line>
      ${bars}
    </svg>
    ${chartTable(['Mois', 'CA signé'], s.months.map(m => [m.label, fmtEUR(m.total)]))}`;
}
function niceStep(max) {
  const raw = max / 3;
  const pow = Math.pow(10, Math.floor(Math.log10(raw)));
  for (const m of [1, 2, 5, 10]) if (raw <= m * pow) return m * pow;
  return 10 * pow;
}
function compactEUR(v) {
  if (v >= 1e6) return (v / 1e6).toLocaleString('fr-FR', { maximumFractionDigits: 1 }) + ' M€';
  if (v >= 1000) return Math.round(v / 1000) + ' k€';
  return Math.round(v) + ' €';
}

/* ---------- raisons de perte : barres horizontales, une série ---------- */
function lossChart(s) {
  const rows = s.lossList;
  const max = Math.max(1, ...rows.map(r => r[1]));
  const W = 520, LBL = 150, BARMAX = W - LBL - 70, RH = 30;
  const H = rows.length * RH + 6;
  const bars = rows.map(([reason, n], i) => {
    const w = Math.max(2, Math.round(BARMAX * n / max));
    const y = i * RH + 4;
    const pct = Math.round(100 * n / s.lost.length);
    return `
      <text x="${LBL - 8}" y="${y + 15}" text-anchor="end" font-size="11.5" fill="var(--ink-2)">${esc(reason)}</text>
      <rect x="${LBL}" y="${y}" width="${w}" height="18" rx="4" fill="var(--chart-1)" data-tip="${esc(reason)} — ${n} affaire${n > 1 ? 's' : ''} (${pct} %)"></rect>
      <text x="${LBL + w + 8}" y="${y + 14}" font-size="11" fill="var(--ink-3)" style="font-family:var(--mono)">${n} · ${pct} %</text>`;
  }).join('');
  return `
    <svg viewBox="0 0 ${W} ${H}" role="img" aria-label="Raisons de perte">${bars}</svg>
    ${chartTable(['Raison', 'Affaires'], rows.map(([r, n]) => [r, String(n)]))}`;
}

function chartTable(headers, rows) {
  return `
    <details class="chart-table">
      <summary>Voir les données</summary>
      <table><thead><tr>${headers.map(h => `<th>${esc(h)}</th>`).join('')}</tr></thead>
      <tbody>${rows.map(r => `<tr>${r.map(v => `<td>${esc(v)}</td>`).join('')}</tr>`).join('')}</tbody></table>
    </details>`;
}

/* tooltip de survol, jamais indispensable (table en dessous) */
function bindVizTips(root) {
  const tip = $('#vizTip');
  $$('svg [data-tip]', root).forEach(el => {
    el.addEventListener('pointerenter', () => { tip.textContent = el.dataset.tip; tip.style.display = 'block'; });
    el.addEventListener('pointermove', e => {
      const pad = 12;
      tip.style.left = Math.min(window.innerWidth - tip.offsetWidth - 8, e.clientX + pad) + 'px';
      tip.style.top = (e.clientY - tip.offsetHeight - 10 < 8 ? e.clientY + pad : e.clientY - tip.offsetHeight - 10) + 'px';
    });
    el.addEventListener('pointerleave', () => { tip.style.display = 'none'; });
  });
}
</script>

          <button class="btn" id="dDemo">${S.meta.demo ? 'Régénérer les données de démonstration' : 'Charger des données de démonstration'}</button>
          <button class="btn btn-danger" id="dWipe">Tout effacer</button>
        </div>
      </div>
    </div>`;

  /* --- étapes --- */
  $('#stageSave').onclick = () => {
    const rows = $$('#stageRows .stage-row');
    const next = rows.map(r => {
      const i = Number(r.dataset.i);
      const old = st.stages[i] || { id: uid() };
      return {
        id: old.id,
        name: $('[data-f="name"]', r).value.trim() || 'Étape',
        prob: Math.max(0, Math.min(100, Number($('[data-f="prob"]', r).value) || 0)),
        rot: Math.max(0, Number($('[data-f="rot"]', r).value) || 0),
      };
    });
    st.stages = next;
    commit(); toast('Pipeline mis à jour');
  };
  $('#stageAdd').onclick = () => {
    st.stages.push({ id: uid(), name: 'Nouvelle étape', prob: 50, rot: 14 });
    commit();
  };
  $$('#stageRows [data-del]').forEach(b => b.onclick = () => {
    if (st.stages.length <= 1) { toast('Impossible de supprimer la dernière étape'); return; }
    const i = Number(b.dataset.del);
    const stage = st.stages[i];
    const used = S.deals.filter(d => d.stageId === stage.id && d.status === 'open').length;
    if (used) { toast(used + ' affaire(s) en cours sur cette étape — déplacez-les d’abord'); return; }
    st.stages.splice(i, 1);
    commit();
  });
  $$('#stageRows [data-up]').forEach(b => b.onclick = () => {
    const i = Number(b.dataset.up);
    if (i > 0) { [st.stages[i - 1], st.stages[i]] = [st.stages[i], st.stages[i - 1]]; commit(); }
  });

  /* --- cadence devis --- */
  $('#cadSave').onclick = () => {
    st.quoteCadence = $$('[data-cad]').map(i => Math.max(1, Number(i.value) || 3));
    commit(); toast('Cadence enregistrée');
  };

  /* --- modèles --- */
  $('#tplAdd').onclick = () => openTemplateModal(null);
  $$('[data-tpl-edit]').forEach(b => b.onclick = () => openTemplateModal(Number(b.dataset.tplEdit)));
  $$('[data-tpl-del]').forEach(b => b.onclick = () => { st.emailTemplates.splice(Number(b.dataset.tplDel), 1); commit(); });

  /* --- données --- */
  $('#dExport').onclick = exportBackup;
  $('#dImport').onclick = importBackup;
  $('#dCsvC').onclick = () => exportContactsCSV();
  $('#dCsvA').onclick = exportDealsCSV;
  $('#dCsvImport').onclick = openCsvImport;
  $('#dIcs').onclick = exportICS;
  $('#dRgpd').onclick = openRgpdModal;
  $('#dDemo').onclick = () => {
    if (S.contacts.length && !S.meta.demo) {
      openModal(`
        <div class="modal-head"><h2>Remplacer par la démonstration ?</h2></div>
        <div class="modal-body"><p style="margin:0">Vos ${S.contacts.length} contacts et ${S.deals.length} affaires seront remplacés par des données fictives. Exportez d’abord une sauvegarde.</p></div>
        <div class="modal-foot"><button class="btn" data-close>Annuler</button><button class="btn btn-danger" id="demoOk">Remplacer</button></div>`);
      $('#demoOk').onclick = () => { closeModal(); seedDemo(); commit(); toast('Données de démonstration chargées'); };
    } else { seedDemo(); commit(); toast('Données de démonstration chargées'); }
  };
  $('#dWipe').onclick = () => {
    openModal(`
      <div class="modal-head"><h2>Tout effacer ?</h2></div>
      <div class="modal-body"><p style="margin:0">Suppression définitive de ${S.contacts.length} contacts, ${S.deals.length} affaires et ${S.activities.length} activités de ce navigateur. Aucun retour en arrière sans sauvegarde .json.</p></div>
      <div class="modal-foot"><button class="btn" data-close>Annuler</button><button class="btn btn-danger" id="wipeOk">Effacer définitivement</button></div>`);
    $('#wipeOk').onclick = () => { S = emptyState(); closeModal(); commit(); toast('Données effacées'); };
  };
}

function openTemplateModal(idx) {
  const t = idx != null ? S.settings.emailTemplates[idx] : { name: '', subject: '', body: '' };
  openModal(`
    <div class="modal-head"><h2>${idx != null ? 'Modifier le modèle' : 'Nouveau modèle'}</h2></div>
