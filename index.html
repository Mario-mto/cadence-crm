<!doctype html>
<html lang="fr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Cadence — CRM de relance</title>
<meta name="description" content="Cadence — le moteur de relance pour indépendants et TPE. Un seul fichier, zéro serveur, vos données ne quittent jamais votre poste.">
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='7' fill='%231c1a16'/%3E%3Cpath d='M9 22V14M15 22V10M21 22V17' stroke='%23fffdf8' stroke-width='3' stroke-linecap='round'/%3E%3Ccircle cx='25.5' cy='9.5' r='2.5' fill='%23c23524'/%3E%3C/svg%3E">
<style>
/* ============================================================
   CADENCE — CRM de relance · fichier unique, zéro dépendance
   Système : couleur = signal (rouge retard, ambre dormance,
   vert gagné) ; l'encre fait le reste. Mono pour les données.
   ============================================================ */

:root {
  --paper: #f4f2ec;
  --surface: #fffdf8;
  --surface-2: #faf7ef;
  --ink: #1c1a16;
  --ink-2: #5d594f;
  --ink-3: #726d60;
  --red-ink: #fff;
  --hairline: #e7e3d7;
  --hairline-2: #d9d4c5;
  --accent: #1c1a16;
  --accent-ink: #fffdf8;
  --red: #c23524;
  --red-soft: #f9e9e4;
  --amber: #8a6100;
  --amber-dot: #d99f16;
  --amber-soft: #f6edd3;
  --green: #1c7a3a;
  --green-soft: #e6f1e2;
  --chart-1: #2a78d6;
  --chart-o1: #86b6ef; --chart-o2: #5598e7; --chart-o3: #2a78d6; --chart-o4: #1c5cab;
  --shadow-1: 0 1px 2px rgba(28,26,22,.05);
  --shadow-2: 0 6px 24px rgba(28,26,22,.09);
  --sans: "Segoe UI Variable Text", "Segoe UI", system-ui, -apple-system, "Helvetica Neue", Arial, sans-serif;
  --mono: "Cascadia Mono", Consolas, ui-monospace, "SF Mono", "Roboto Mono", monospace;
  color-scheme: light;
}
html[data-theme="dark"] {
  --paper: #131210;
  --surface: #1d1b17;
  --surface-2: #262319;
  --ink: #f0ede4;
  --ink-2: #b3aea1;
  --ink-3: #918c7e;
  --red-ink: #131210;
  --hairline: #2e2b24;
  --hairline-2: #3b372e;
  --accent: #f0ede4;
  --accent-ink: #171512;
  --red: #e0654e;
  --red-soft: #3a1f19;
  --amber: #d9a83c;
  --amber-dot: #d9a83c;
  --amber-soft: #33290f;
  --green: #5cb87a;
  --green-soft: #1b3122;
  --chart-1: #3987e5;
  --chart-o1: #6da7ec; --chart-o2: #3987e5; --chart-o3: #256abf; --chart-o4: #184f95;
  --shadow-1: 0 1px 2px rgba(0,0,0,.3);
  --shadow-2: 0 8px 28px rgba(0,0,0,.45);
  color-scheme: dark;
}

*, *::before, *::after { box-sizing: border-box; }
html, body { margin: 0; padding: 0; }
html { height: 100%; }
body {
  font-family: var(--sans);
  font-size: 14px;
  line-height: 1.45;
  color: var(--ink);
  background: var(--paper);
  min-height: 100%;
  -webkit-font-smoothing: antialiased;
}
button, input, select, textarea { font: inherit; color: inherit; }
img, svg { display: block; max-width: 100%; }
a { color: inherit; }
::placeholder { color: var(--ink-3); }
:focus { outline: none; }
:focus-visible { outline: 2px solid var(--ink); outline-offset: 2px; border-radius: 4px; }
@media (prefers-reduced-motion: reduce) {
  *, *::before, *::after { animation: none !important; transition: none !important; }
}

/* ---------- Structure ---------- */
#app { display: flex; min-height: 100vh; }
.sidebar {
  width: 212px; flex: 0 0 212px;
  position: sticky; top: 0; height: 100vh;
  display: flex; flex-direction: column;
  border-right: 1px solid var(--hairline);
  padding: 18px 12px 14px;
  background: var(--paper);
  z-index: 30;
}
.brand { display: flex; align-items: center; gap: 10px; padding: 2px 8px 16px; }
.brand svg { flex: 0 0 auto; }
.brand-name { font-weight: 700; font-size: 16px; letter-spacing: .01em; }
.brand-sub { font-family: var(--mono); font-size: 9.5px; color: var(--ink-3); letter-spacing: .08em; text-transform: uppercase; margin-top: 1px; }

.nav { display: flex; flex-direction: column; gap: 2px; }
.nav-item {
  display: flex; align-items: center; gap: 10px;
  padding: 8px 10px; border-radius: 8px;
  border: none; background: none; cursor: pointer;
  color: var(--ink-2); text-align: left; width: 100%;
  font-weight: 500;
}
.nav-item svg { flex: 0 0 auto; opacity: .75; }
.nav-item:hover { background: var(--surface-2); color: var(--ink); }
.nav-item.active { background: var(--accent); color: var(--accent-ink); }
.nav-item.active svg { opacity: 1; }
.nav-count {
  margin-left: auto; font-family: var(--mono); font-size: 11px;
  background: var(--red); color: var(--red-ink); border-radius: 999px;
  min-width: 20px; height: 20px; display: inline-flex; align-items: center; justify-content: center;
  padding: 0 6px;
}
.nav-item.active .nav-count { background: var(--red); }

.sidebar-foot { margin-top: auto; display: flex; flex-direction: column; gap: 8px; padding: 0 4px; }
.backup-chip {
  display: flex; align-items: center; gap: 8px;
  font-family: var(--mono); font-size: 10.5px; color: var(--ink-3);
  padding: 8px 8px; border: 1px dashed var(--hairline-2); border-radius: 8px;
  background: none; cursor: pointer; text-align: left; width: 100%;
}
.backup-chip:hover { color: var(--ink-2); border-color: var(--ink-3); }
.backup-chip.warn { color: var(--amber); border-color: var(--amber-dot); }
.backup-chip .dot { width: 7px; height: 7px; border-radius: 50%; background: var(--green); flex: 0 0 auto; }
.backup-chip.warn .dot { background: var(--amber-dot); }
.theme-row { display: flex; align-items: center; justify-content: space-between; padding: 0 4px; }
.local-note { font-family: var(--mono); font-size: 9.5px; color: var(--ink-3); line-height: 1.6; padding: 0 4px; }

.main { flex: 1; min-width: 0; display: flex; flex-direction: column; }
.topbar {
  position: sticky; top: 0; z-index: 25;
  display: flex; align-items: center; gap: 12px;
  height: 58px; padding: 0 24px;
  background: color-mix(in srgb, var(--paper) 88%, transparent);
  backdrop-filter: blur(8px);
  border-bottom: 1px solid var(--hairline);
}
.view-title { font-size: 16px; font-weight: 700; margin-right: auto; display: flex; align-items: baseline; gap: 10px; }
.view-title .sub { font-family: var(--mono); font-size: 11px; font-weight: 400; color: var(--ink-3); }

.searchbtn {
  display: flex; align-items: center; gap: 8px;
  border: 1px solid var(--hairline-2); border-radius: 8px;
  background: var(--surface); color: var(--ink-3);
  padding: 7px 12px; min-width: 220px; cursor: pointer;
}
.searchbtn:hover { border-color: var(--ink-3); color: var(--ink-2); }
.searchbtn kbd { margin-left: auto; }
kbd {
  font-family: var(--mono); font-size: 10px; color: var(--ink-2);
  border: 1px solid var(--hairline-2); border-bottom-width: 2px; border-radius: 5px;
  padding: 1px 5px; background: var(--surface);
}

/* ---------- Boutons ---------- */
.btn {
  display: inline-flex; align-items: center; gap: 7px;
  border: 1px solid var(--hairline-2); border-radius: 8px;
  background: var(--surface); color: var(--ink);
  padding: 7px 14px; cursor: pointer; font-weight: 600; font-size: 13.5px;
  transition: border-color .12s, background .12s;
  white-space: nowrap;
}
.btn:hover { border-color: var(--ink-3); }
.btn-primary { background: var(--accent); color: var(--accent-ink); border-color: var(--accent); }
.btn-primary:hover { opacity: .88; border-color: var(--accent); }
.btn-danger { color: var(--red); border-color: color-mix(in srgb, var(--red) 40%, var(--hairline-2)); }
.btn-danger:hover { border-color: var(--red); background: var(--red-soft); }
.btn-ghost { border-color: transparent; background: none; color: var(--ink-2); }
.btn-ghost:hover { background: var(--surface-2); color: var(--ink); }
.btn-sm { padding: 4px 10px; font-size: 12.5px; border-radius: 7px; }
.btn-xs { padding: 2px 8px; font-size: 11.5px; border-radius: 6px; gap: 5px; }
.btn[disabled] { opacity: .45; cursor: not-allowed; }
.iconbtn {
  display: inline-flex; align-items: center; justify-content: center;
  width: 32px; height: 32px; border-radius: 8px; border: none;
  background: none; color: var(--ink-2); cursor: pointer;
}
.iconbtn:hover { background: var(--surface-2); color: var(--ink); }

/* ---------- Champs ---------- */
.field { display: flex; flex-direction: column; gap: 5px; }
.field label { font-size: 12px; font-weight: 600; color: var(--ink-2); }
.field label .opt { font-weight: 400; color: var(--ink-3); }
.input, .select, .textarea {
  border: 1px solid var(--hairline-2); border-radius: 8px;
  background: var(--surface); padding: 8px 10px; width: 100%;
  color: var(--ink);
}
.input:focus, .select:focus, .textarea:focus { border-color: var(--ink); }
.textarea { resize: vertical; min-height: 64px; }
.field-hint { font-size: 11.5px; color: var(--ink-3); }
.field-warn { font-size: 12px; color: var(--amber); display: flex; align-items: center; gap: 6px; }
.field-warn a { text-decoration: underline; cursor: pointer; }

/* ---------- Chips & badges ---------- */
.chip {
  display: inline-flex; align-items: center; gap: 5px;
  font-family: var(--mono); font-size: 10.5px; letter-spacing: .02em;
  border: 1px solid var(--hairline-2); border-radius: 999px;
  padding: 2px 9px; color: var(--ink-2); background: var(--surface);
  white-space: nowrap;
}
.chip.red { color: var(--red); border-color: color-mix(in srgb, var(--red) 45%, transparent); background: var(--red-soft); }
.chip.amber { color: var(--amber); border-color: color-mix(in srgb, var(--amber-dot) 55%, transparent); background: var(--amber-soft); }
.chip.green { color: var(--green); border-color: color-mix(in srgb, var(--green) 40%, transparent); background: var(--green-soft); }
.chip.tag { cursor: pointer; }
.chip.tag:hover { border-color: var(--ink-3); color: var(--ink); }
.dot { display: inline-block; width: 8px; height: 8px; border-radius: 50%; }
.dot.red { background: var(--red); }
.dot.amber { background: var(--amber-dot); }
.dot.green { background: var(--green); }

.money { font-family: var(--mono); font-variant-numeric: tabular-nums; }
.mono { font-family: var(--mono); }
.muted { color: var(--ink-3); }
.eyebrow {
  font-family: var(--mono); font-size: 10px; letter-spacing: .12em;
  text-transform: uppercase; color: var(--ink-3); font-weight: 400;
}

/* ---------- Cartes / sections ---------- */
.view { padding: 22px 26px 90px; max-width: 1240px; width: 100%; margin: 0 auto; }
.view.wide { max-width: none; margin: 0; }
.card {
  background: var(--surface); border: 1px solid var(--hairline);
  border-radius: 12px; box-shadow: var(--shadow-1);
}
.card-pad { padding: 16px 18px; }
.section-head { display: flex; align-items: baseline; gap: 10px; margin: 26px 0 10px; }
.section-head:first-child { margin-top: 0; }
.section-head h2 { font-size: 13px; font-weight: 700; margin: 0; letter-spacing: .01em; }
.section-head .count { font-family: var(--mono); font-size: 11px; color: var(--ink-3); }
.section-head .spacer { flex: 1; }

/* ---------- Écran Aujourd'hui ---------- */
.today-hero { display: flex; align-items: flex-end; justify-content: space-between; gap: 16px; margin-bottom: 20px; flex-wrap: wrap; }
.today-hero h1 { font-size: 26px; font-weight: 750; margin: 0; letter-spacing: -.01em; }
.today-hero .date { font-family: var(--mono); font-size: 11.5px; color: var(--ink-3); margin-top: 4px; }
.today-actions { display: flex; gap: 8px; }

.banner {
  display: flex; align-items: center; gap: 10px;
  border: 1px solid color-mix(in srgb, var(--amber-dot) 55%, transparent);
  background: var(--amber-soft); color: var(--amber);
  border-radius: 10px; padding: 9px 14px; margin-bottom: 16px; font-size: 13px;
}
.banner .btn { margin-left: auto; }

.task-list { display: flex; flex-direction: column; }
.task-row {
  display: flex; align-items: center; gap: 12px;
  padding: 10px 14px; border-bottom: 1px solid var(--hairline);
  background: var(--surface); cursor: pointer;
}
.task-row:first-child { border-top-left-radius: 12px; border-top-right-radius: 12px; }
.task-row:last-child { border-bottom: none; border-bottom-left-radius: 12px; border-bottom-right-radius: 12px; }
.task-row:hover { background: var(--surface-2); }
.task-main { flex: 1; min-width: 0; display: flex; flex-direction: column; gap: 1px; }
.task-title { font-weight: 600; display: flex; align-items: center; gap: 8px; min-width: 0; }
.task-title .who { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.task-sub { font-size: 12px; color: var(--ink-3); display: flex; gap: 8px; align-items: center; min-width: 0; }
.task-sub .action-label { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.task-side { display: flex; align-items: center; gap: 8px; flex: 0 0 auto; }
.task-quick { display: none; gap: 6px; }
.task-row:hover .task-quick, .task-row:focus-within .task-quick { display: inline-flex; }
.overdue-days { font-family: var(--mono); font-size: 11px; color: var(--red); }

.empty {
  padding: 36px 24px; text-align: center; color: var(--ink-3);
  display: flex; flex-direction: column; align-items: center; gap: 10px;
}
.empty .big { font-size: 15px; font-weight: 600; color: var(--ink-2); }
.empty .btn { margin-top: 4px; }

/* Accueil premier lancement */
.welcome { max-width: 560px; margin: 8vh auto 0; text-align: center; display: flex; flex-direction: column; align-items: center; gap: 14px; }
.welcome h1 { font-size: 30px; margin: 10px 0 0; letter-spacing: -.01em; }
.welcome p { color: var(--ink-2); margin: 0; max-width: 44ch; }
.welcome .row { display: flex; gap: 10px; margin-top: 10px; flex-wrap: wrap; justify-content: center; }
.welcome .fine { font-family: var(--mono); font-size: 10.5px; color: var(--ink-3); margin-top: 14px; line-height: 1.7; }
</style>
</head>
<body>
<style>
/* ---------- Pipeline (kanban) ---------- */
.pipe-band {
  display: flex; gap: 24px; align-items: center; flex-wrap: wrap;
  padding: 12px 18px; margin-bottom: 16px;
}
.pipe-stat { display: flex; flex-direction: column; gap: 1px; }
.pipe-stat .v { font-size: 19px; font-weight: 700; letter-spacing: -.01em; }
.pipe-stat .v.red { color: var(--red); }
.pipe-stat .l { font-size: 11px; color: var(--ink-3); }
.pipe-band .sep { width: 1px; align-self: stretch; background: var(--hairline); }

.board {
  display: flex; gap: 12px; align-items: flex-start;
  overflow-x: auto; padding: 2px 26px 30px;
  scrollbar-width: thin;
}
.col {
  flex: 0 0 268px; width: 268px;
  background: color-mix(in srgb, var(--surface-2) 60%, transparent);
  border: 1px solid var(--hairline); border-radius: 12px;
  display: flex; flex-direction: column; max-height: calc(100vh - 210px);
}
.col.closed { background: none; border-style: dashed; }
.col-head { padding: 10px 12px 8px; display: flex; align-items: baseline; gap: 7px; }
.col-head .name { font-weight: 700; font-size: 12.5px; }
.col-head .n { font-family: var(--mono); font-size: 10.5px; color: var(--ink-3); }
.col-head .prob { margin-left: auto; font-family: var(--mono); font-size: 10px; color: var(--ink-3); }
.col-totals { padding: 0 12px 8px; font-family: var(--mono); font-size: 10.5px; color: var(--ink-3); display: flex; gap: 10px; }
.col-body { padding: 4px 8px 10px; display: flex; flex-direction: column; gap: 8px; overflow-y: auto; min-height: 40px; scrollbar-width: thin; }
.col-body.dragover { background: color-mix(in srgb, var(--ink) 5%, transparent); border-radius: 8px; }

.deal-card {
  background: var(--surface); border: 1px solid var(--hairline);
  border-left: 3px solid transparent;
  border-radius: 10px; padding: 9px 11px 8px;
  cursor: grab; box-shadow: var(--shadow-1);
  display: flex; flex-direction: column; gap: 6px;
}
.deal-card:hover { border-color: var(--hairline-2); box-shadow: var(--shadow-2); }
.deal-card.state-late { border-left-color: var(--red) !important; }
.deal-card.state-sleep { border-left-color: var(--amber-dot) !important; }
.deal-card.dragging { opacity: .45; cursor: grabbing; }
.deal-top { display: flex; align-items: baseline; gap: 8px; }
.deal-title { font-weight: 650; font-size: 13px; flex: 1; min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.deal-amount { font-family: var(--mono); font-size: 12px; font-variant-numeric: tabular-nums; color: var(--ink-2); }
.deal-who { font-size: 12px; color: var(--ink-3); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.deal-foot { display: flex; align-items: center; gap: 6px; min-height: 20px; }
.deal-foot .spacer { flex: 1; }
.next-chip { display: inline-flex; align-items: center; gap: 5px; font-family: var(--mono); font-size: 10.5px; color: var(--ink-2); }
.next-chip.late { color: var(--red); font-weight: 600; }
.next-chip.none { color: var(--amber); }
.sleep-tag { font-family: var(--mono); font-size: 10px; color: var(--amber); }

/* micro-prompt après un drop */
.drop-prompt {
  display: flex; align-items: center; gap: 8px;
  background: var(--accent); color: var(--accent-ink);
  border-radius: 10px; padding: 8px 12px; font-size: 12.5px;
  box-shadow: var(--shadow-2);
}
.drop-prompt input {
  background: transparent; border: none; color: inherit; width: 130px;
  border-bottom: 1px solid color-mix(in srgb, var(--accent-ink) 40%, transparent);
  font-family: var(--mono); font-size: 12px; padding: 1px 2px;
}
.drop-prompt kbd { border-color: color-mix(in srgb, var(--accent-ink) 45%, transparent); color: var(--accent-ink); background: none; }

/* ---------- Contacts (table) ---------- */
.toolbar { display: flex; align-items: center; gap: 10px; margin-bottom: 14px; flex-wrap: wrap; }
.toolbar .input { width: 240px; }
.toolbar .spacer { flex: 1; }
.tag-filter { display: flex; gap: 6px; flex-wrap: wrap; }
.tag-filter .chip.on { background: var(--accent); color: var(--accent-ink); border-color: var(--accent); }

.table-wrap { overflow-x: auto; border: 1px solid var(--hairline); border-radius: 12px; background: var(--surface); box-shadow: var(--shadow-1); }
table.data { border-collapse: collapse; width: 100%; min-width: 760px; }
table.data th {
  font-family: var(--mono); font-size: 10px; letter-spacing: .1em; text-transform: uppercase;
  color: var(--ink-3); font-weight: 500; text-align: left;
  padding: 10px 12px; border-bottom: 1px solid var(--hairline);
  position: sticky; top: 0; background: var(--surface); z-index: 2;
}
table.data td { padding: 8px 12px; border-bottom: 1px solid var(--hairline); vertical-align: middle; }
table.data tbody tr { cursor: pointer; }
table.data tbody tr:hover { background: var(--surface-2); }
table.data tbody tr:last-child td { border-bottom: none; }
table.data td.num { font-family: var(--mono); font-variant-numeric: tabular-nums; text-align: right; }
table.data .cell-edit { cursor: text; border-radius: 6px; padding: 2px 6px; margin: -2px -6px; min-height: 20px; }
table.data .cell-edit:hover { background: color-mix(in srgb, var(--ink) 6%, transparent); }
table.data .cell-edit input { border: none; background: var(--surface); width: 100%; padding: 2px 6px; margin: -2px -6px; border-radius: 6px; outline: 2px solid var(--ink); font-size: inherit; }
.rowcheck { width: 30px; }
.rowcheck input { accent-color: var(--ink); cursor: pointer; }

.bulkbar {
  position: fixed; bottom: 22px; left: 50%; transform: translateX(-50%);
  display: flex; align-items: center; gap: 10px;
  background: var(--accent); color: var(--accent-ink);
  border-radius: 12px; padding: 9px 16px; z-index: 60; box-shadow: var(--shadow-2);
}
.bulkbar .btn { background: none; border-color: color-mix(in srgb, var(--accent-ink) 35%, transparent); color: var(--accent-ink); }
.bulkbar .btn:hover { border-color: var(--accent-ink); }
.bulkbar .n { font-family: var(--mono); font-size: 12px; }

/* ---------- Drawer (fiche) ---------- */
.drawer-veil { position: fixed; inset: 0; background: rgba(15,13,10,.35); z-index: 70; opacity: 0; transition: opacity .16s; }
.drawer-veil.open { opacity: 1; }
.drawer {
  position: fixed; top: 0; right: 0; bottom: 0; width: min(560px, 100vw);
  background: var(--surface); border-left: 1px solid var(--hairline);
  z-index: 71; display: flex; flex-direction: column;
  transform: translateX(100%); transition: transform .18s ease-out;
  box-shadow: var(--shadow-2);
}
.drawer.open { transform: translateX(0); }
.drawer-head { display: flex; align-items: flex-start; gap: 10px; padding: 18px 20px 12px; border-bottom: 1px solid var(--hairline); }
.drawer-head h2 { font-size: 17px; margin: 0; flex: 1; min-width: 0; }
.drawer-head .sub { font-size: 12.5px; color: var(--ink-3); margin-top: 2px; display: flex; gap: 8px; flex-wrap: wrap; align-items: center; }
.drawer-body { flex: 1; overflow-y: auto; padding: 16px 20px 40px; scrollbar-width: thin; }
.drawer-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px 14px; }
.drawer-grid .full { grid-column: 1 / -1; }
.kv { display: flex; flex-direction: column; gap: 2px; min-width: 0; }

<script>
'use strict';

/* ============================================================
   1. UTILITAIRES
   ============================================================ */
const $  = (s, el = document) => el.querySelector(s);
const $$ = (s, el = document) => [...el.querySelectorAll(s)];
const uid = () => Date.now().toString(36) + '-' + Math.random().toString(36).slice(2, 8);
const esc = s => String(s ?? '').replace(/[&<>"']/g, c => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c]));
const norm = s => String(s ?? '').toLowerCase().normalize('NFD').replace(/[̀-ͯ]/g, '');

const pad2 = n => String(n).padStart(2, '0');
function isoDate(d = new Date()) { return d.getFullYear() + '-' + pad2(d.getMonth() + 1) + '-' + pad2(d.getDate()); }
function parseISO(iso) { const [y, m, d] = String(iso).slice(0, 10).split('-').map(Number); return new Date(y, m - 1, d); }
function addDays(iso, n) { const d = parseISO(iso); d.setDate(d.getDate() + n); return isoDate(d); }
function today() { return isoDate(); }
function daysFromToday(iso) { return Math.round((parseISO(iso) - parseISO(today())) / 864e5); }
function daysSince(ts) { if (!ts) return Infinity; const d = new Date(ts); if (isNaN(d)) return Infinity; return Math.max(0, Math.round((parseISO(today()) - parseISO(isoDate(d))) / 864e5)); }
function nextMonday() { const d = new Date(); const delta = ((8 - d.getDay()) % 7) || 7; d.setDate(d.getDate() + delta); return isoDate(d); }
function monthKey(ts) { const d = new Date(ts); return isNaN(d) ? '' : d.getFullYear() + '-' + pad2(d.getMonth() + 1); }

const nfEUR = new Intl.NumberFormat('fr-FR', { style: 'currency', currency: 'EUR', maximumFractionDigits: 0 });
const fmtEUR = n => nfEUR.format(Math.round(n || 0));
const dfShort = new Intl.DateTimeFormat('fr-FR', { day: 'numeric', month: 'short' });
const dfLong  = new Intl.DateTimeFormat('fr-FR', { weekday: 'long', day: 'numeric', month: 'long' });
const dfFull  = new Intl.DateTimeFormat('fr-FR', { day: 'numeric', month: 'short', year: 'numeric' });
const dfTime  = new Intl.DateTimeFormat('fr-FR', { hour: '2-digit', minute: '2-digit' });
const dfMonth = new Intl.DateTimeFormat('fr-FR', { month: 'short' });
const fmtDay = iso => dfShort.format(parseISO(iso));
const fmtFull = ts => dfFull.format(new Date(ts));
function relDay(iso) {
  const d = daysFromToday(iso);
  if (d === 0) return "aujourd'hui";
  if (d === 1) return 'demain';
  if (d === -1) return 'hier';
  if (d < 0) return 'il y a ' + (-d) + ' j';
  if (d <= 14) return 'dans ' + d + ' j';
  return fmtDay(iso);
}
function relPast(ts) {
  if (!ts) return 'jamais';
  const d = daysSince(ts);
  if (d === 0) return "aujourd'hui";
  if (d === 1) return 'hier';
  if (d < 30) return 'il y a ' + d + ' j';
  if (d < 365) return 'il y a ' + Math.round(d / 30) + ' mois';
  return 'il y a ' + (d / 365).toFixed(1).replace('.', ',') + ' an(s)';
}
function fmtPhone(p) {
  const digits = String(p || '').replace(/[^\d+]/g, '');
  let d = digits;
  if (d.startsWith('+33')) d = '0' + d.slice(3);
  if (/^0\d{9}$/.test(d)) return d.match(/\d{2}/g).join(' ');
  return String(p || '').trim();
}
function debounce(fn, ms) { let t; return (...a) => { clearTimeout(t); t = setTimeout(() => fn(...a), ms); }; }
function download(filename, content, mime) {
  const blob = new Blob([content], { type: mime || 'application/octet-stream' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = filename;
  a.click();
  setTimeout(() => URL.revokeObjectURL(a.href), 4000);
}

/* ============================================================
   2. STORE — localStorage, schéma versionné, multi-onglets
   ============================================================ */
const SCHEMA_VERSION = 1;
const LS_KEY = 'cadence.crm';

const LOSS_REASONS = ['Pas de décision', 'Prix', 'Concurrent', 'Pas de budget', 'Sans réponse', 'Autre'];
const ACTION_KINDS = { relance: 'Relance', appel: 'Appel', email: 'Email', rdv: 'RDV', autre: 'Autre' };
const ACT_TYPES = { note: 'Note', appel: 'Appel', email: 'Email', rdv: 'RDV', etape: 'Étape', systeme: '—' };

function defaultStages() {
  return [
    { id: 'piste',   name: 'Piste',          prob: 10, rot: 21 },
    { id: 'contact', name: 'Contact établi', prob: 25, rot: 14 },
    { id: 'devis',   name: 'Devis envoyé',   prob: 50, rot: 10 },
    { id: 'nego',    name: 'Négociation',    prob: 75, rot: 7 },
  ];
}
function defaultTemplates() {
  return [
    {
      id: 'tpl-devis', name: 'Relance devis',
      subject: 'Votre devis {societe} — on en parle ?',
      body: 'Bonjour {prenom},\n\nJe me permets de revenir vers vous au sujet du devis de {montant} que je vous ai transmis.\nAvez-vous eu le temps d’y jeter un œil ? Je reste disponible pour en discuter ou l’ajuster.\n\nBien cordialement,'
    },
    {
      id: 'tpl-suivi', name: 'Reprise de contact',
      subject: 'Des nouvelles de {societe}',
      body: 'Bonjour {prenom},\n\nNous avions échangé il y a quelque temps au sujet de votre projet.\nOù en êtes-vous ? Si le sujet est toujours d’actualité, je serais ravi d’en reparler.\n\nBien cordialement,'
    },
  ];
}
function emptyState() {
  return {
    schemaVersion: SCHEMA_VERSION,
    contacts: [],
    deals: [],
    activities: [],
    settings: {
      stages: defaultStages(),
      theme: 'auto',
      lossReasons: LOSS_REASONS.slice(),
      emailTemplates: defaultTemplates(),
      quoteCadence: [3, 7, 14],
    },
    meta: { createdAt: new Date().toISOString(), lastBackupAt: null, demo: false, onboarded: false },
  };
}

let S = emptyState();

function validateState(raw) {
  if (!raw || typeof raw !== 'object') throw new Error('Fichier illisible');
  if (!Array.isArray(raw.contacts) || !Array.isArray(raw.deals) || !Array.isArray(raw.activities)) throw new Error('Structure invalide : contacts / deals / activities manquants');
  if ((raw.schemaVersion || 0) > SCHEMA_VERSION) throw new Error('Cette sauvegarde vient d’une version plus récente de Cadence');
  return true;
}
const safeId = x => { const t = String(x ?? '').replace(/[^a-zA-Z0-9_-]/g, '').slice(0, 40); return t || uid(); };
const safeTs = (x, fallback) => { const d = new Date(x); return isNaN(d) ? (fallback || new Date().toISOString()) : d.toISOString(); };
const safeDate = x => /^\d{4}-\d{2}-\d{2}$/.test(String(x)) ? String(x) : null;
const safeStr = (x, max) => String(x ?? '').slice(0, max);
const safeNum = (x, lo, hi, dflt) => { const n = Number(x); return Number.isFinite(n) ? Math.max(lo, Math.min(hi, n)) : dflt; };

function migrate(raw) {
  // Toute donnée chargée ou importée est assainie champ par champ : un JSON
  // malformé (ou malveillant) ne doit ni casser le rendu ni injecter du HTML.
  const base = emptyState();
  raw.settings = Object.assign(base.settings, raw.settings || {});
  raw.meta = Object.assign(base.meta, raw.meta || {});
  if (!Array.isArray(raw.settings.stages) || !raw.settings.stages.length) raw.settings.stages = defaultStages();
  raw.settings.stages = raw.settings.stages.map(st => ({
    id: safeId(st && st.id), name: safeStr((st && st.name) || 'Étape', 60),
    prob: safeNum(st && st.prob, 0, 100, 50), rot: safeNum(st && st.rot, 0, 365, 0),
  }));
  const stageIds = new Set(raw.settings.stages.map(st => st.id));
  const firstStage = raw.settings.stages[0].id;
  if (!Array.isArray(raw.settings.quoteCadence)) raw.settings.quoteCadence = [3, 7, 14];
  if (!Array.isArray(raw.settings.emailTemplates)) raw.settings.emailTemplates = defaultTemplates();
  if (!Array.isArray(raw.settings.lossReasons)) raw.settings.lossReasons = LOSS_REASONS.slice();

  raw.contacts = (raw.contacts || []).filter(c => c && typeof c === 'object').map(c => ({
    id: safeId(c.id), name: safeStr(c.name || 'Sans nom', 120), company: safeStr(c.company, 120),
    email: safeStr(c.email, 160), phone: safeStr(c.phone, 40),
    tags: Array.isArray(c.tags) ? c.tags.map(t => safeStr(t, 40)).filter(Boolean).slice(0, 20) : [],
    note: safeStr(c.note, 4000), siret: safeStr(c.siret, 20), tva: safeStr(c.tva, 20),
    createdAt: safeTs(c.createdAt),
  }));
  const contactIds = new Set(raw.contacts.map(c => c.id));

  raw.deals = (raw.deals || []).filter(d => d && typeof d === 'object').map(d => {
    const createdAt = safeTs(d.createdAt);
    const stageId = stageIds.has(String(d.stageId)) ? String(d.stageId) : firstStage;
    const status = ['open', 'won', 'lost'].includes(d.status) ? d.status : 'open';
    const hist = (Array.isArray(d.stageHistory) ? d.stageHistory : [])
      .filter(h => h && stageIds.has(String(h.stageId)))
      .map(h => ({ stageId: String(h.stageId), at: safeTs(h.at, createdAt) }));
    return {
      id: safeId(d.id), contactId: safeId(d.contactId), title: safeStr(d.title || 'Affaire', 160),
      value: safeNum(d.value, 0, 1e9, 0), stageId,
      prob: d.prob == null || d.prob === '' ? null : safeNum(d.prob, 0, 100, null),
      status, lostReason: d.lostReason == null ? null : safeStr(d.lostReason, 60),
      createdAt, closedAt: status === 'open' ? null : safeTs(d.closedAt, createdAt),
      lastActivityAt: safeTs(d.lastActivityAt, createdAt),
      stageHistory: hist.length ? hist : [{ stageId, at: createdAt }],
      next: d.next && typeof d.next === 'object' && safeDate(d.next.date)
        ? { kind: (d.next.kind in ACTION_KINDS) ? d.next.kind : 'relance', label: safeStr(d.next.label, 120), date: safeDate(d.next.date) }
        : null,
    };
  }).filter(d => contactIds.has(d.contactId));
  const dealIds = new Set(raw.deals.map(d => d.id));

  raw.activities = (raw.activities || []).filter(a => a && typeof a === 'object').map(a => ({
    id: safeId(a.id),
    dealId: a.dealId == null || !dealIds.has(safeId(a.dealId)) ? null : safeId(a.dealId),
    contactId: a.contactId == null ? null : safeId(a.contactId),
    type: (a.type in ACT_TYPES) ? a.type : 'note',
    text: safeStr(a.text, 4000), at: safeTs(a.at),
  })).filter(a => (a.contactId && contactIds.has(a.contactId)) || a.dealId);

  raw.schemaVersion = SCHEMA_VERSION;
  return raw;
}
function loadState() {
  try {
    const raw = localStorage.getItem(LS_KEY);
    if (!raw) return emptyState();
    const parsed = JSON.parse(raw);
    validateState(parsed);
    return migrate(parsed);
  } catch (e) {
    console.warn('Cadence : état illisible, démarrage à vide.', e);
    return emptyState();
  }
}
function persist() {
  try { localStorage.setItem(LS_KEY, JSON.stringify(S)); }
  catch (e) { toast('Impossible d’enregistrer (stockage plein ?). Exportez une sauvegarde.', null, 8000); }
}
function commit() { persist(); render(); }

window.addEventListener('storage', e => {
  if (e.key !== LS_KEY) return;
  S = loadState();
  closeDrawer(true); closeModal(); closePalette();
  render();
  toast('Données mises à jour depuis un autre onglet');
});

/* ---------- accès ---------- */
const contactById = id => S.contacts.find(c => c.id === id);
const dealById = id => S.deals.find(d => d.id === id);
const stageById = id => S.settings.stages.find(s => s.id === id);
const stageIndex = id => S.settings.stages.findIndex(s => s.id === id);
const openDeals = () => S.deals.filter(d => d.status === 'open');
const dealsOfContact = cid => S.deals.filter(d => d.contactId === cid);
const actsOfDeal = did => S.activities.filter(a => a.dealId === did).sort((a, b) => b.at.localeCompare(a.at));
const actsOfContact = cid => S.activities.filter(a => a.contactId === cid).sort((a, b) => b.at.localeCompare(a.at));

function addActivity(o) {
  const a = Object.assign({ id: uid(), at: new Date().toISOString(), type: 'note', text: '', dealId: null, contactId: null }, o);
  S.activities.push(a);
  if (a.dealId && a.type !== 'systeme') {
    const d = dealById(a.dealId);
    if (d) d.lastActivityAt = a.at;
  }
  return a;
}

/* ============================================================
   3. MÉTIER — pondération, alertes, relances, stats
   ============================================================ */
function dealProb(d) {
  if (d.status === 'won') return 100;
  if (d.status === 'lost') return 0;
  if (d.prob != null && d.prob !== '') return Number(d.prob);
  const st = stageById(d.stageId);
  return st ? st.prob : 100;
}
const dealWeighted = d => (Number(d.value) || 0) * dealProb(d) / 100;

/* Nombre de contacts pris sur l'affaire (appels, emails, rdv) — le compteur de relance */
function touchCount(d) {
  return S.activities.filter(a => a.dealId === d.id && ['appel', 'email', 'rdv'].includes(a.type)).length;
}

/* Hiérarchie d'alerte unifiée : late (rouge) > sleep (ambre) > noaction (ambre pâle) > ok.
   Une action planifiée à 7 jours ou moins suspend la dormance (amélioration vs Pipedrive). */
function dealAlert(d) {
  if (d.status !== 'open') return 'ok';
  if (d.next && d.next.date && daysFromToday(d.next.date) < 0) return 'late';
  const st = stageById(d.stageId);
  const rot = st && st.rot ? Number(st.rot) : 0;
  const idle = daysSince(d.lastActivityAt || d.createdAt);
  const soon = d.next && d.next.date && daysFromToday(d.next.date) >= 0 && daysFromToday(d.next.date) <= 7;
  if (rot && idle > rot && !soon) return 'sleep';
  if (!d.next || !d.next.date) return 'noaction';
  return 'ok';
}
const lateDeals  = () => openDeals().filter(d => dealAlert(d) === 'late');
const sleepDeals = () => openDeals().filter(d => dealAlert(d) === 'sleep');
const noActionDeals = () => openDeals().filter(d => dealAlert(d) === 'noaction');
const dueToday  = () => openDeals().filter(d => d.next && d.next.date && daysFromToday(d.next.date) === 0);
const dueTomorrow = () => openDeals().filter(d => d.next && d.next.date && daysFromToday(d.next.date) === 1);

function pipelineTotals() {
  const open = openDeals();
  const brut = open.reduce((s, d) => s + (Number(d.value) || 0), 0);
  const pond = open.reduce((s, d) => s + dealWeighted(d), 0);
  const wonMonth = S.deals
    .filter(d => d.status === 'won' && d.closedAt && monthKey(d.closedAt) === monthKey(new Date()))
    .reduce((s, d) => s + (Number(d.value) || 0), 0);
  return { brut, pond, wonMonth, late: lateDeals().length };
}

/* Prochaine échéance par défaut : cadence devis J+3/J+7/J+14, sinon +3 j. */
function suggestedDelay(d) {
  const st = stageById(d.stageId);
  const cad = S.settings.quoteCadence || [3, 7, 14];
  if (st && st.id === 'devis') {
    const n = touchCount(d);
    return cad[Math.min(n, cad.length - 1)];
  }
  return 3;
}

/* ---------- statistiques (avec seuils pédagogiques) ---------- */
function statsData() {
  const closed = S.deals.filter(d => d.status !== 'open');
  const won = S.deals.filter(d => d.status === 'won');
  const lost = S.deals.filter(d => d.status === 'lost');
  const winRate = closed.length >= 5 ? Math.round(100 * won.length / closed.length) : null;
  const avgBasket = won.length >= 3 ? won.reduce((s, d) => s + (Number(d.value) || 0), 0) / won.length : null;
  const cycles = won.filter(d => d.closedAt && d.createdAt)
    .map(d => Math.max(1, Math.round((new Date(d.closedAt) - new Date(d.createdAt)) / 864e5)));
  const avgCycle = cycles.length >= 3 ? Math.round(cycles.reduce((a, b) => a + b, 0) / cycles.length) : null;

  // Entonnoir : part des affaires ayant atteint chaque étape.
  // Une affaire gagnée a, par définition, traversé tout le pipeline.
  const all = S.deals.length;
  const maxIdxOf = d => d.status === 'won'
    ? S.settings.stages.length - 1
    : Math.max(0, ...d.stageHistory.map(h => stageIndex(h.stageId)).filter(i => i >= 0), stageIndex(d.stageId));
  const funnel = S.settings.stages.map((st, k) => ({
    stage: st,
    n: S.deals.filter(d => maxIdxOf(d) >= k).length,
  }));
  funnel.push({ stage: { id: '__won', name: 'Gagné' }, n: won.length });

  // CA gagné par mois (6 derniers mois)
  const months = [];
  for (let i = 5; i >= 0; i--) {
    const d = new Date(); d.setDate(1); d.setMonth(d.getMonth() - i);
    const key = d.getFullYear() + '-' + pad2(d.getMonth() + 1);
    months.push({
      key, label: dfMonth.format(d).replace('.', ''),
      total: won.filter(w => w.closedAt && monthKey(w.closedAt) === key).reduce((s, w) => s + (Number(w.value) || 0), 0),
    });
  }
  // Raisons de perte
  const reasons = {};
  lost.forEach(d => { const r = d.lostReason || 'Non précisé'; reasons[r] = (reasons[r] || 0) + 1; });
  const lossList = Object.entries(reasons).sort((a, b) => b[1] - a[1]);

  const prevKey = (() => { const d = new Date(); d.setDate(1); d.setMonth(d.getMonth() - 1); return d.getFullYear() + '-' + pad2(d.getMonth() + 1); })();
  const wonPrevMonth = won.filter(d => d.closedAt && monthKey(d.closedAt) === prevKey).reduce((s, d) => s + (Number(d.value) || 0), 0);

  return { closed, won, lost, winRate, avgBasket, avgCycle, funnel, months, lossList, all, wonPrevMonth };
}
</script>

<script>
'use strict';

/* ============================================================
